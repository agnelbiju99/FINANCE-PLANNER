  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ont-weight:600;color:var(--text2);\n  border-bottom:3px solid transparent;cursor:pointer;\n  white-space:nowrap;transition:color .15s,border-color .15s;\n  background:none;\n}\n.tab:hover{color:var(--text)}\n.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}\n\n/* ===== MAIN ===== */\nmain{max-width:1100px;margin:0 auto;padding:32px 24px}\n.card{\n  background:var(--surface);border:1px solid var(--border);\n  border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);\n  margin-bottom:20px;\n}\n.card-title{\n  font-family:'Plus Jakarta Sans',sans-serif;\n  font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;\n  color:var(--text2);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;\n}\n.page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700}\n\n.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}\n.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}\n.grid-auto{display:grid;grid-template-columns:1fr 1.4fr;gap:20px}\n.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:20px}\n.stat{\n  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);\n  padding:16px 18px;box-shadow:var(--shadow);min-width:0;\n}\n.stat .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)}\n.stat .val{font-family:'Fraunces',serif;font-size:24px;font-weight:700;margin-top:6px;color:var(--text)}\n.stat .val.green{color:var(--accent2)}\n.stat .val.coral{color:var(--coral)}\n.stat .sub{font-size:11px;color:var(--muted);margin-top:2px}\n.stat .sub.ok{color:var(--accent2)}\n.stat .sub.warn{color:var(--coral)}\n.stat-clickable{cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}\n.stat-clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent-light)}\n.stat-budget .budget-edit-row{\n  display:flex;align-items:baseline;gap:4px;margin-top:6px;\n}\n.stat-budget .budget-currency{\n  font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--text);\n}\n.stat-budget .budget-inline-input{\n  font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--text);\n  background:transparent;border:none;padding:0;border-bottom:2px dashed var(--border);\n  border-radius:0;flex:1;min-width:0;width:auto;height:auto;\n  transition:border-color .15s;\n}\n.stat-budget .budget-inline-input:focus{\n  border-bottom-color:var(--accent);outline:none;\n}\n.stat-budget .budget-inline-input::placeholder{color:var(--muted);font-weight:700}\n.stat-budget .budget-inline-input::-webkit-outer-spin-button,\n.stat-budget .budget-inline-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}\n.stat-budget .budget-inline-input{-moz-appearance:textfield}\n\n/* ===== Date Navigators ===== */\n.date-nav{\n  display:flex;align-items:center;gap:8px;margin-bottom:20px;\n  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);\n  padding:12px 16px;box-shadow:var(--shadow);\n}\n.date-nav button{\n  width:36px;height:36px;border-radius:10px;font-size:18px;\n  background:var(--accent-ultra);color:var(--accent2);font-weight:700;\n}\n.date-nav button:hover{background:var(--accent-light)}\n.date-nav .date-main{font-family:'Fraunces',serif;font-size:20px;font-weight:700;flex:1;text-align:center}\n.date-nav .date-sub{font-size:11px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}\n\n/* ===== Progress bars ===== */\n.bar{\n  width:100%;height:8px;background:var(--accent-light);\n  border-radius:999px;overflow:hidden;position:relative;\n}\n.bar.tall{height:10px}\n.bar .fill{\n  height:100%;border-radius:999px;\n  background:linear-gradient(to right,var(--accent),var(--accent2));\n  transition:width .35s;\n}\n.bar.v .fill{background:linear-gradient(to right,#9B7EE0,var(--violet))}\n.bar.a .fill{background:linear-gradient(to right,#FCD34D,var(--amber))}\n.bar.c .fill{background:linear-gradient(to right,#F8A09D,var(--coral))}\n\n/* ===== Lists / items ===== */\n.list{display:flex;flex-direction:column;gap:8px}\n.list-item{\n  display:flex;align-items:center;gap:10px;\n  padding:10px 12px;background:var(--accent-ultra);border-radius:var(--radius-sm);\n  border:1px solid var(--border);\n}\n.list-item .meta{font-size:11px;color:var(--muted)}\n.list-item .grow{flex:1;min-width:0}\n.list-item .amt{font-weight:700;font-family:'Fraunces',serif;font-size:15px}\n.list-item .amt.coral{color:var(--coral)}\n.list-item .amt.green{color:var(--accent2)}\n.x-btn{\n  width:24px;height:24px;border-radius:6px;font-size:12px;\n  color:var(--muted);background:transparent;\n}\n.x-btn:hover{background:var(--coral-light);color:var(--coral)}\n.badge{\n  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;\n  padding:3px 8px;border-radius:999px;\n}\n.badge.income{background:var(--accent-light);color:var(--accent2)}\n.badge.expense{background:var(--coral-light);color:var(--coral)}\n\n/* checkboxes */\n.checkbox{\n  width:20px;height:20px;border-radius:6px;border:2px solid var(--border);\n  background:var(--surface);display:flex;align-items:center;justify-content:center;\n  flex-shrink:0;cursor:pointer;color:#fff;font-size:12px;\n}\n.checkbox.checked{background:var(--accent);border-color:var(--accent)}\n.task-text{flex:1;font-size:14px}\n.task-text.done{text-decoration:line-through;color:var(--muted)}\n\n/* form rows */\n.form-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}\n.form-row > *{flex:1;min-width:0}\n.form-row > button{flex:0 0 auto}\n.form-row > input{min-width:140px}\n\n/* affirmation box */\n.affirm{\n  background:linear-gradient(135deg,var(--accent-ultra),var(--violet-light));\n  border:1px solid var(--border);border-radius:var(--radius);\n  padding:28px 24px 22px;position:relative;overflow:hidden;\n  margin-bottom:20px;\n}\n.affirm::before{\n  content:'\"';position:absolute;top:-10px;left:14px;\n  font-family:'Fraunces',serif;font-size:80px;opacity:0.15;color:var(--accent2);\n  line-height:1;font-weight:700;\n}\n.affirm-text{font-family:'Fraunces',serif;font-style:italic;font-size:19px;color:var(--text);position:relative;z-index:1}\n.affirm-text .author{display:block;font-size:11px;font-style:normal;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-top:8px}\n.affirm button{margin-top:14px}\n\n/* mood emoji buttons */\n.mood-row{display:flex;gap:8px;flex-wrap:wrap}\n.mood-btn{\n  width:48px;height:48px;border-radius:12px;font-size:24px;\n  background:var(--surface);border:2px solid var(--border);cursor:pointer;\n  transition:all .15s;display:flex;align-items:center;justify-content:center;\n}\n.mood-btn:hover{transform:scale(1.06)}\n.mood-btn.selected{background:var(--accent-light);border-color:var(--accent)}\n\n/* budget check */\n.bc-row{display:flex;gap:8px;margin-bottom:12px}\n.bc-btn{\n  flex:1;padding:12px;border-radius:var(--radius-sm);\n  background:var(--surface);border:1px solid var(--border);\n  font-weight:600;font-size:13px;color:var(--text2);\n}\n.bc-btn.yes.selected{background:var(--accent-light);border-color:var(--accent);color:var(--accent2)}\n.bc-btn.no.selected{background:var(--coral-light);border-color:var(--coral);color:var(--coral)}\n\n/* nudge */\n.nudge{\n  background:linear-gradient(135deg,var(--accent-ultra),var(--surface));\n  border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;\n  font-size:13px;color:var(--text2);line-height:1.55;\n}\n.nudge b{color:var(--accent2);font-weight:700;font-size:14px}\n\n/* week grid */\n.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:20px}\n.week-day{\n  aspect-ratio:1/1;border-radius:var(--radius-sm);\n  background:var(--accent-ultra);border:1px solid var(--border);\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  position:relative;font-size:11px;color:var(--text2);\n}\n.week-day .dn{font-weight:700;text-transform:uppercase;letter-spacing:0.04em;font-size:10px;color:var(--muted)}\n.week-day .dd{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1}\n.week-day.today{background:var(--accent);border-color:var(--accent)}\n.week-day.today .dn,.week-day.today .dd{color:#fff}\n.week-day .dot{position:absolute;bottom:6px;width:5px;height:5px;border-radius:50%;background:var(--accent2)}\n.week-day.today .dot{background:#fff}\n\n/* table */\n.tbl{width:100%;border-collapse:collapse;font-size:13px}\n.tbl th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);padding:8px 6px;border-bottom:1px solid var(--border);font-weight:700}\n.tbl td{padding:10px 6px;border-bottom:1px solid var(--border);color:var(--text)}\n.tbl tr:last-child td{border-bottom:none}\n.tbl td.right{text-align:right;font-weight:700;font-family:'Fraunces',serif}\n\n/* Net worth box */\n.nw-box{\n  margin-top:14px;padding:18px;border-radius:var(--radius);\n  background:linear-gradient(135deg,var(--accent-ultra),var(--violet-light));\n  border:1px solid var(--border);text-align:center;\n}\n.nw-box .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700}\n.nw-box .val{font-family:'Fraunces',serif;font-size:32px;font-weight:700;margin-top:6px;color:var(--accent2)}\n.nw-box .val.coral{color:var(--coral)}\n\n/* monthly goal card */\n.mgoal{\n  padding:14px;border-radius:var(--radius-sm);background:var(--accent-ultra);\n  border:1px solid var(--border);border-left:4px solid var(--accent);\n  margin-bottom:10px;\n}\n.mgoal.v{border-left-color:var(--violet)}\n.mgoal.a{border-left-color:var(--amber)}\n.mgoal.c{border-left-color:var(--coral)}\n.mgoal .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}\n.mgoal .ttl{font-weight:700;color:var(--text);font-size:14px}\n.mgoal .meta{font-size:11px;color:var(--muted)}\n.mgoal input[type=range]{width:100%;margin-top:8px;accent-color:var(--accent)}\n.mgoal .pct{font-size:11px;color:var(--accent2);font-weight:700;margin-top:4px}\n\n/* reflection */\n.reflection{background:var(--accent-ultra);padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:10px}\n.reflection label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}\n\n/* Savings Goals cards */\n.sg-card{\n  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);\n  padding:20px;margin-bottom:14px;box-shadow:var(--shadow);\n  border-left:4px solid var(--accent);transition:transform .2s,box-shadow .2s;\n}\n.sg-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}\n.sg-card.v{border-left-color:var(--violet)}\n.sg-card.a{border-left-color:var(--amber)}\n.sg-card.c{border-left-color:var(--coral)}\n.sg-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}\n.sg-name{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700;margin-bottom:4px}\n.sg-saved{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1.1}\n.sg-of{font-size:12px;color:var(--muted);margin-top:2px}\n.sg-meta{font-size:11px;color:var(--text2);margin-top:6px}\n.sg-pct{font-family:'Fraunces',serif;font-size:30px;font-weight:700;text-align:right;line-height:1;color:var(--accent2)}\n.sg-card.v .sg-pct{color:var(--violet)}\n.sg-card.a .sg-pct{color:var(--amber)}\n.sg-card.c .sg-pct{color:var(--coral)}\n.sg-left{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}\n.sg-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}\n\n/* Smart Insights */\n.insight{\n  display:flex;gap:14px;padding:18px;border-radius:var(--radius);\n  background:var(--surface);border:1px solid var(--border);\n  margin-bottom:12px;box-shadow:var(--shadow);\n}\n.insight .ico{\n  width:48px;height:48px;border-radius:12px;flex-shrink:0;\n  background:var(--accent-ultra);display:flex;align-items:center;justify-content:center;font-size:22px;\n}\n.insight .ico.a{background:var(--amber-light)}\n.insight .ico.c{background:var(--coral-light)}\n.insight .ico.v{background:var(--violet-light)}\n.insight h4{font-size:14px;font-weight:700;margin-bottom:4px}\n.insight p{font-size:13px;color:var(--text2);margin:0;line-height:1.5}\n.ih{color:var(--accent2);font-weight:700}\n.ih.a{color:var(--amber)}\n.ih.c{color:var(--coral)}\n.ih.v{color:var(--violet)}\n\n/* AI Coach */\n.chat-box{\n  height:500px;display:flex;flex-direction:column;\n  background:var(--accent-ultra);border:1px solid var(--border);border-radius:var(--radius-sm);\n  padding:14px;overflow-y:auto;gap:10px;\n}\n.msg{max-width:80%;padding:10px 14px;font-size:13px;line-height:1.5}\n.msg.u{align-self:flex-end;background:var(--accent);color:#fff;border-radius:12px 12px 4px 12px}\n.msg.c{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 12px 4px;color:var(--text)}\n.msg.c strong{color:var(--accent2)}\n.typing{display:flex;gap:4px;align-self:flex-start;background:var(--surface);border:1px solid var(--border);padding:14px;border-radius:12px 12px 12px 4px}\n.typing-dot{\n  width:8px;height:8px;border-radius:50%;background:var(--muted);\n  animation:bounce 1s infinite ease-in-out;\n}\n.typing-dot:nth-child(2){animation-delay:0.2s}\n.typing-dot:nth-child(3){animation-delay:0.4s}\n@keyframes bounce{\n  0%,80%,100%{transform:translateY(0);opacity:0.4}\n  40%{transform:translateY(-6px);opacity:1}\n}\n.qq{display:flex;flex-direction:column;gap:8px}\n.qq button{\n  text-align:left;background:var(--accent-ultra);border:1px solid var(--border);\n  padding:10px 14px;border-radius:999px;font-size:13px;color:var(--text2);font-weight:600;\n  transition:background .15s;\n}\n.qq button:hover{background:var(--accent-light)}\n\n/* streak panel */\n.streak-panel{\n  background:linear-gradient(135deg,var(--accent-ultra),var(--violet-light));\n  border:1px solid var(--border);border-radius:var(--radius);padding:22px;\n}\n.streak-big{font-family:'Fraunces',serif;font-size:52px;font-weight:700;color:var(--accent2);line-height:1}\n.streak-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:700;margin-top:4px}\n.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:16px}\n.streak-cell{\n  aspect-ratio:1/1;border-radius:6px;background:var(--surface);border:1px solid var(--border);\n  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);\n}\n.streak-cell.f{background:var(--accent);color:#fff;border-color:var(--accent)}\n.streak-cell.today{border:2px solid var(--accent2)}\n.streak-msg{margin-top:14px;font-size:13px;color:var(--text2);text-align:center;font-weight:600}\n\n/* Modals */\n.modal-bg{\n  position:fixed;inset:0;background:rgba(15,26,15,0.55);z-index:200;\n  display:none;align-items:center;justify-content:center;padding:20px;\n  backdrop-filter:blur(2px);\n}\n.modal-bg.open{display:flex}\n.modal{\n  background:var(--surface);border-radius:var(--radius);padding:28px;\n  max-width:460px;width:100%;box-shadow:var(--shadow-md);\n  border:1px solid var(--border);\n}\n.modal h3{font-family:'Fraunces',serif;font-size:24px;font-weight:700;margin-bottom:6px}\n.modal .subtitle{color:var(--muted);font-size:13px;margin-bottom:18px}\n.alloc-row{\n  display:flex;justify-content:space-between;align-items:center;\n  padding:12px 14px;border-radius:var(--radius-sm);background:var(--accent-ultra);\n  margin-bottom:8px;\n}\n.alloc-row .left{display:flex;flex-direction:column}\n.alloc-row .nm{font-weight:700;font-size:14px}\n.alloc-row .desc{font-size:11px;color:var(--muted);margin-top:2px}\n.alloc-row .val{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--accent2)}\n.alloc-row.amber .val{color:var(--amber)}\n.alloc-row.violet .val{color:var(--violet)}\n.modal-section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700;margin:16px 0 8px}\n.modal-btn-row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}\n\n/* Detail modal rows */\n.detail-row{\n  display:flex;align-items:center;gap:12px;\n  padding:12px 14px;border-radius:var(--radius-sm);\n  background:var(--accent-ultra);border:1px solid var(--border);\n  margin-bottom:8px;\n}\n.detail-row .d-check{\n  width:22px;height:22px;border-radius:6px;flex-shrink:0;\n  display:flex;align-items:center;justify-content:center;\n  font-size:13px;font-weight:700;\n}\n.detail-row .d-check.done{background:var(--accent);color:#fff;border:none}\n.detail-row .d-check.pending{background:var(--surface);border:2px solid var(--border);color:transparent}\n.detail-row .d-text{flex:1;font-size:14px;font-weight:600;min-width:0;word-break:break-word}\n.detail-row .d-text.done{text-decoration:line-through;color:var(--muted);font-weight:500}\n.detail-row .d-emoji{font-size:22px;flex-shrink:0}\n.detail-row .d-amt{font-family:'Fraunces',serif;font-weight:700;font-size:16px;color:var(--coral);flex-shrink:0}\n.detail-row .d-cat{font-size:11px;color:var(--muted);margin-top:2px}\n.detail-summary{\n  margin-top:14px;padding:14px;border-radius:var(--radius-sm);\n  background:linear-gradient(135deg,var(--accent-ultra),var(--violet-light));\n  border:1px solid var(--border);\n  display:flex;justify-content:space-between;align-items:center;\n}\n.detail-summary .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700}\n.detail-summary .val{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--accent2)}\n.detail-summary .val.coral{color:var(--coral)}\n\n/* Save indicator */\n.save-toast{\n  position:fixed;bottom:24px;right:24px;\n  background:var(--accent);color:#fff;font-weight:600;font-size:13px;\n  padding:10px 16px;border-radius:999px;box-shadow:0 4px 16px rgba(45,18 splay:none}\n  .curr-menu{right:auto;left:50%;transform:translateX(-50%)}\n  /* Stack form-row fields full-width on mobile so placeholders read fully */\n  .form-row{flex-direction:column;align-items:stretch;gap:10px}\n  .form-row > *{flex:1 1 auto !important;width:100%;min-width:0}\n  .form-row > button{width:100%}\n  .esel{display:block;min-width:0}\n  .esel-menu{left:0;right:0;min-width:0;width:100%}\n  .esel.up .esel-menu{bottom:calc(100% + 6px);top:auto}\n  /* Make stat cards more readable on mobile */\n  .stat{padding:14px 14px}\n  .stat .val{font-size:22px}\n  .stat-budget .budget-currency,\n  .stat-budget .budget-inline-input{font-size:22px}\n}\n@media (max-width:380px){\n  .header-inner{gap:6px}\n  .logo-text .brand{font-size:14px}\n  .btn{padding:6px 9px;font-size:11px}\n  .curr-trigger{padding:5px 8px;font-size:11px}\n  .stat-row{gap:10px}\n}\n\n.empty-state{\n  text-align:center;padding:24px;color:var(--muted);font-size:13px;\n  background:var(--accent-ultra);border-radius:var(--radius-sm);border:1px dashed var(--border);\n}\n\n/* ===== Emoji-only custom select ===== */\n.esel{position:relative;display:inline-block;min-width:72px}\n.esel-trigger{\n  display:flex;align-items:center;justify-content:space-between;gap:14px;\n  background:var(--surface);border:1px solid var(--border);\n  border-radius:var(--radius-sm);padding:10px 14px;height:42px;\n  width:100%;cursor:pointer;color:var(--text);font-size:14px;\n  transition:border-color .15s;\n}\n.esel-trigger:hover{border-color:var(--accent)}\n.esel.open .esel-trigger{border-color:var(--accent)}\n.esel-emoji{font-size:18px;line-height:1;flex-shrink:0}\n.esel-caret{color:var(--muted);font-size:10px;flex-shrink:0;transition:transform .15s}\n.esel.open .esel-caret{transform:rotate(180deg);color:var(--accent2)}\n.esel-menu{\n  position:absolute;top:calc(100% + 6px);left:0;right:auto;min-width:220px;\n  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);\n  box-shadow:var(--shadow-md);z-index:80;\n  display:none;max-height:280px;overflow-y:auto;padding:6px;\n}\n.esel.open .esel-menu{display:block}\n.esel.up .esel-menu{top:auto;bottom:calc(100% + 6px)}\n.esel-opt{\n  padding:9px 12px;cursor:pointer;font-size:13px;\n  display:flex;align-items:center;gap:12px;border-radius:8px;\n  color:var(--text);\n}\n.esel-opt:hover{background:var(--accent-ultra)}\n.esel-opt.sel{background:var(--accent-light);color:var(--accent2);font-weight:600}\n.section-head{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700;margin:8px 0}\n.link-btn{font-size:11px;color:var(--accent2);font-weight:700;text-transform:none;letter-spacing:0;cursor:pointer;background:none;border:none}\n.link-btn:hover{text-decoration:underline}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<header>\n  <div class=\"header-inner\">\n    <div class=\"logo-wrap\">\n      <div class=\"logo-icon\">\n        <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n          <rect x=\"3\" y=\"8\" width=\"22\" height=\"12\" rx=\"6\" stroke=\"#fff\" stroke-width=\"1.5\" fill=\"none\"><\u002Frect>\n          <ellipse cx=\"6.5\" cy=\"14\" rx=\"1.2\" ry=\"1.6\" stroke=\"#fff\" stroke-width=\"1\" fill=\"none\"><\u002Fellipse>\n          <ellipse cx=\"21.5\" cy=\"14\" rx=\"1.2\" ry=\"1.6\" stroke=\"#fff\" stroke-width=\"1\" fill=\"none\"><\u002Fellipse>\n          <circle cx=\"14\" cy=\"14\" r=\"3\" stroke=\"#fff\" stroke-width=\"1.2\" fill=\"none\"><\u002Fcircle>\n          <text x=\"14\" y=\"16.5\" text-anchor=\"middle\" font-family=\"Plus Jakarta Sans\" font-weight=\"700\" font-size=\"5\" fill=\"#fff\">$<\u002Ftext>\n          <line x1=\"8.5\" y1=\"12\" x2=\"10.5\" y2=\"12\" stroke=\"#fff\" stroke-width=\"0.7\"><\u002Fline>\n          <line x1=\"8.5\" y1=\"14\" x2=\"10.5\" y2=\"14\" stroke=\"#fff\" stroke-width=\"0.7\"><\u002Fline>\n          <line x1=\"8.5\" y1=\"16\" x2=\"10.5\" y2=\"16\" stroke=\"#fff\" stroke-width=\"0.7\"><\u002Fline>\n          <line x1=\"17.5\" y1=\"12\" x2=\"19.5\" y2=\"12\" stroke=\"#fff\" stroke-width=\"0.7\"><\u002Fline>\n          <line x1=\"17.5\" y1=\"14\" x2=\"19.5\" y2=\"14\" stroke=\"#fff\" stroke-width=\"0.7\"><\u002Fline>\n          <line x1=\"17.5\" y1=\"16\" x2=\"19.5\" y2=\"16\" stroke=\"#fff\" stroke-width=\"0.7\"><\u002Fline>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"logo-text\">\n        <div class=\"brand\">Finance <span class=\"accent\">Planner<\u002Fspan><\u002Fdiv>\n        <div class=\"tag\">by Wiz DesignStore<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"header-right\">\n      <div id=\"streakBadge\" class=\"streak-badge\" style=\"display:none\">🔥 <span id=\"streakNum\">0<\u002Fspan><span class=\"streak-label\"> day streak<\u002Fspan><\u002Fdiv>\n      <div id=\"headerDate\" class=\"header-date\"><\u002Fdiv>\n      <div class=\"dk-toggle\" id=\"dkToggle\" title=\"Toggle dark mode\"><div class=\"knob\" id=\"dkKnob\">☀️<\u002Fdiv><\u002Fdiv>\n      <div class=\"curr-select\" id=\"currSelect\">\n        <button class=\"curr-trigger\" onclick=\"toggleCurrMenu(event)\" title=\"Change currency\">\n          <span class=\"curr-flag\" id=\"currFlag\">🇮🇳<\u002Fspan>\n          <span class=\"curr-code\" id=\"currCode\">INR<\u002Fspan>\n          <span class=\"curr-caret\">▼<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"curr-menu\" id=\"currMenu\"><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn amber\" onclick=\"openPayday()\">💸 Payday!<\u002Fbutton>\n      <div class=\"header-actions-desktop\">\n        <button class=\"btn\" onclick=\"doBackup()\">↓ Backup<\u002Fbutton>\n        <button class=\"btn\" onclick=\"document.getElementById('restoreFile').click()\">↑ Restore<\u002Fbutton>\n        <button class=\"btn\" onclick=\"openClear()\">🗑 Clear<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"kebab-wrap\" id=\"kebabWrap\">\n        <button class=\"kebab-btn\" onclick=\"toggleKebab(event)\" title=\"More options\" aria-label=\"More options\">⋯<\u002Fbutton>\n        <div class=\"kebab-menu\">\n          <button class=\"kebab-item\" onclick=\"closeKebab();doBackup()\">↓ Backup data<\u002Fbutton>\n          <button class=\"kebab-item\" onclick=\"closeKebab();document.getElementById('restoreFile').click()\">↑ Restore data<\u002Fbutton>\n          <button class=\"kebab-item danger\" onclick=\"closeKebab();openClear()\">🗑 Clear data<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <input type=\"file\" id=\"restoreFile\" accept=\".json\" style=\"display:none\" onchange=\"doRestore(event)\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<nav class=\"tabs\">\n  <div class=\"tabs-inner\" id=\"tabsRow\">\n    <button class=\"tab active\" data-tab=\"daily\">☀️ Daily<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"weekly\">📅 Weekly<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"monthly\">🗓️ Monthly<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"goals\">🎯 Savings Goals<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"insights\">📊 Smart Insights<\u002Fbutton>\n    <button class=\"tab\" data-tab=\"coach\">🧠 AI Coach<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<main id=\"main\"><\u002Fmain>\n\n<!-- Save indicator -->\n<div class=\"save-toast\" id=\"saveToast\">✅ Saved<\u002Fdiv>\n<div class=\"milestone-toast\" id=\"milestoneToast\"><\u002Fdiv>\n\n<!-- Payday Modal -->\n<div class=\"modal-bg\" id=\"paydayModal\">\n  <div class=\"modal\">\n    <h3>💸 Payday Mode!<\u002Fh3>\n    <p class=\"subtitle\">Enter your income and see how to allocate it<\u002Fp>\n    <label class=\"section-head\" style=\"margin-top:0\">Payday Amount (<span class=\"curr-lbl\">₹<\u002Fspan>)<\u002Flabel>\n    <input type=\"number\" id=\"paydayInput\" placeholder=\"e.g. 75000\" oninput=\"updatePayday()\">\n    <div id=\"allocations\" style=\"margin-top:16px\"><\u002Fdiv>\n    <div id=\"goalAllocations\"><\u002Fdiv>\n    <div class=\"modal-btn-row\">\n      <button class=\"btn ghost\" onclick=\"closePayday()\">Close<\u002Fbutton>\n      <button class=\"btn primary\" onclick=\"applyPayday()\">✅ Apply to Monthly Income<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Tasks Detail Modal -->\n<div class=\"modal-bg\" id=\"tasksModal\">\n  <div class=\"modal\">\n    <h3>✅ Tasks Done<\u002Fh3>\n    <p class=\"subtitle\" id=\"tasksModalSubtitle\">Your money moves for today<\u002Fp>\n    <div id=\"tasksModalBody\"><\u002Fdiv>\n    <div class=\"modal-btn-row\">\n      <button class=\"btn ghost\" onclick=\"closeTasksModal()\">Close<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Spending Detail Modal -->\n<div class=\"modal-bg\" id=\"spendsModal\">\n  <div class=\"modal\">\n    <h3>💸 Spent Today<\u002Fh3>\n    <p class=\"subtitle\" id=\"spendsModalSubtitle\">What you spent on today<\u002Fp>\n    <div id=\"spendsModalBody\"><\u002Fdiv>\n    <div class=\"modal-btn-row\">\n      <button class=\"btn ghost\" onclick=\"closeSpendsModal()\">Close<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Clear Modal -->\n<div class=\"modal-bg\" id=\"clearModal\">\n  <div class=\"modal\">\n    <h3>⚠️ Clear All Data?<\u002Fh3>\n    <p class=\"subtitle\">This will permanently delete all your tasks, spends, goals, reflections, and history. Your dark mode preference will be kept. This cannot be undone.<\u002Fp>\n    <div class=\"modal-btn-row\">\n      <button class=\"btn ghost\" onclick=\"closeClear()\">Cancel<\u002Fbutton>\n      <button class=\"btn danger\" onclick=\"doClear()\">Yes, Clear Everything<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ========== UTILITIES ========== */\nconst $ = s => document.querySelector(s);\nconst $$ = s => document.querySelectorAll(s);\n\n/* ===== CURRENCY ===== */\nconst CURRENCIES = [\n  {code:\"USD\", sym:\"$\",   flag:\"🇺🇸\", name:\"US Dollar\",        locale:\"en-US\"},\n  {code:\"EUR\", sym:\"€\",   flag:\"🇪🇺\", name:\"Euro\",             locale:\"de-DE\"},\n  {code:\"GBP\", sym:\"£\",   flag:\"🇬🇧\", name:\"British Pound\",    locale:\"en-GB\"},\n  {code:\"INR\", sym:\"₹\",   flag:\"🇮🇳\", name:\"Indian Rupee\",     locale:\"en-IN\"},\n  {code:\"CAD\", sym:\"C$\",  flag:\"🇨🇦\", name:\"Canadian Dollar\",  locale:\"en-CA\"},\n  {code:\"AUD\", sym:\"A$\",  flag:\"🇦🇺\", name:\"Australian Dollar\",locale:\"en-AU\"},\n  {code:\"JPY\", sym:\"¥\",   flag:\"🇯🇵\", name:\"Japanese Yen\",     locale:\"ja-JP\"},\n  {code:\"CHF\", sym:\"Fr\",  flag:\"🇨🇭\", name:\"Swiss Franc\",      locale:\"de-CH\"},\n  {code:\"SGD\", sym:\"S$\",  flag:\"🇸🇬\", name:\"Singapore Dollar\", locale:\"en-SG\"},\n  {code:\"AED\", sym:\"AED \",flag:\"🇦🇪\", name:\"UAE Dirham\",       locale:\"en-AE\"},\n  {code:\"NZD\", sym:\"NZ$\", flag:\"🇳🇿\", name:\"NZ Dollar\",        locale:\"en-NZ\"},\n  {code:\"ZAR\", sym:\"R \",  flag:\"🇿🇦\", name:\"South African Rand\",locale:\"en-ZA\"},\n  {code:\"BRL\", sym:\"R$\",  flag:\"🇧🇷\", name:\"Brazilian Real\",   locale:\"pt-BR\"},\n  {code:\"MXN\", sym:\"MX$\", flag:\"🇲🇽\", name:\"Mexican Peso\",     locale:\"es-MX\"},\n];\nfunction getCurrency(){\n  const code = localStorage.getItem(\"currency\") || \"INR\";\n  return CURRENCIES.find(c=>c.code===code) || CURRENCIES[3];\n}\nfunction setCurrency(code){\n  localStorage.setItem(\"currency\", code);\n  closeCurrMenu();\n  refreshCurrencyUI();\n  render();\n}\nconst csym = () => getCurrency().sym;\nconst fmt = n => {\n  const c = getCurrency();\n  const num = Number(n||0);\n  // JPY/no-decimal currencies → no decimals; others → keep as integer for these inputs\n  return c.sym + num.toLocaleString(c.locale);\n};\nfunction refreshCurrencyUI(){\n  const c = getCurrency();\n  const flag = $(\"#currFlag\"), code = $(\"#currCode\");\n  if(flag) flag.textContent = c.flag;\n  if(code) code.textContent = c.code;\n  // Update any static currency labels (e.g. inside payday modal)\n  document.querySelectorAll(\".curr-lbl\").forEach(el => el.textContent = c.sym);\n  const menu = $(\"#currMenu\");\n  if(menu){\n    menu.innerHTML = CURRENCIES.map(x=>`\n      <div class=\"curr-opt ${x.code===c.code?'sel':''}\" onclick=\"setCurrency('${x.code}')\">\n        <span class=\"o-flag\">${x.flag}<\u002Fspan>\n        <span class=\"o-code\">${x.code}<\u002Fspan>\n        <span class=\"o-name\">${x.name}<\u002Fspan>\n        <span class=\"o-sym\">${x.sym.trim()}<\u002Fspan>\n      <\u002Fdiv>\n    `).join(\"\");\n  }\n}\nfunction toggleCurrMenu(e){\n  e&&e.stopPropagation();\n  $(\"#currSelect\").classList.toggle(\"open\");\n}\nfunction closeCurrMenu(){\n  const el = $(\"#currSelect\"); if(el) el.classList.remove(\"open\");\n}\nfunction toggleKebab(e){\n  e&&e.stopPropagation();\n  $(\"#kebabWrap\").classList.toggle(\"open\");\n}\nfunction closeKebab(){\n  const el = $(\"#kebabWrap\"); if(el) el.classList.remove(\"open\");\n}\ndocument.addEventListener(\"click\", (e)=>{\n  if(!e.target.closest(\"#currSelect\")) closeCurrMenu();\n  if(!e.target.closest(\"#kebabWrap\")) closeKebab();\n});\n\nconst todayISO = () => new Date().toISOString().slice(0,10);\n\nfunction ymd(d){\n  const y = d.getFullYear();\n  const m = String(d.getMonth()+1).padStart(2,\"0\");\n  const dd = String(d.getDate()).padStart(2,\"0\");\n  return `${y}-${m}-${dd}`;\n}\nfunction fromISO(s){ const [y,m,d]=s.split(\"-\").map(Number); return new Date(y,m-1,d); }\nfunction mondayOf(d){\n  const x = new Date(d);\n  const day = x.getDay(); // 0=Sun..6=Sat\n  const diff = day === 0 ? -6 : 1 - day;\n  x.setDate(x.getDate() + diff);\n  return x;\n}\nfunction monthKey(d){ return d.getFullYear()+\"-\"+String(d.getMonth()+1).padStart(2,\"0\"); }\n\nfunction getJSON(k, def){\n  try{ const v = localStorage.getItem(k); return v===null?def:JSON.parse(v); }catch(e){ return def; }\n}\nfunction setJSON(k, v){\n  localStorage.setItem(k, JSON.stringify(v));\n  showSave();\n}\nfunction getRaw(k, def){ const v = localStorage.getItem(k); return v===null?def:v; }\nfunction setRaw(k, v){ localStorage.setItem(k, v); showSave(); }\n\n/* Save toast */\nlet saveTimer=null;\nfunction showSave(){\n  const t = $(\"#saveToast\");\n  t.classList.add(\"show\");\n  clearTimeout(saveTimer);\n  saveTimer = setTimeout(()=>t.classList.remove(\"show\"), 2000);\n}\n\n/* ========== STATE ========== */\nlet currentTab = \"daily\";\nlet viewDate = new Date();          // for daily\nlet viewWeekDate = new Date();      // for weekly\nlet viewMonthDate = new Date();     // for monthly\nlet currentSpendCat = \"food\";\nlet currentGoalCat = \"emergency\";\n\n/* ========== Emoji select helper ========== */\nfunction emojiSelect(id, value, options, flex, openUp){\n  const opt = options.find(o=>o.v===value) || options[0];\n  return `<div class=\"esel ${openUp?'up':''}\" id=\"${id}\" data-value=\"${opt.v}\" style=\"flex:${flex||1}\">\n    <button type=\"button\" class=\"esel-trigger\" onclick=\"toggleEsel('${id}', event)\">\n      <span class=\"esel-emoji\">${opt.e}<\u002Fspan>\n      <span class=\"esel-caret\">▾<\u002Fspan>\n    <\u002Fbutton>\n    <div class=\"esel-menu\">\n      ${options.map(o=>`<div class=\"esel-opt ${o.v===opt.v?'sel':''}\" data-v=\"${o.v}\" data-emoji=\"${o.e}\" data-name=\"${o.n}\" onclick=\"selectEsel('${id}', '${o.v}', event)\"><span style=\"font-size:18px\">${o.e}<\u002Fspan><span>${o.n}<\u002Fspan><\u002Fdiv>`).join(\"\")}\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\nfunction toggleEsel(id, ev){\n  ev.stopPropagation();\n  document.querySelectorAll('.esel.open').forEach(e=>{ if(e.id!==id) e.classList.remove('open'); });\n  document.getElementById(id).classList.toggle('open');\n}\nfunction selectEsel(id, v, ev){\n  ev.stopPropagation();\n  const el = document.getElementById(id);\n  const opt = el.querySelector(`.esel-opt[data-v=\"${v}\"]`);\n  el.dataset.value = v;\n  el.querySelector('.esel-emoji').textContent = opt.dataset.emoji;\n  el.querySelectorAll('.esel-opt').forEach(o=>o.classList.toggle('sel', o.dataset.v===v));\n  el.classList.remove('open');\n  if(id===\"spendCat\") currentSpendCat = v;\n  if(id===\"sgCat\") currentGoalCat = v;\n}\ndocument.addEventListener('click', ()=>{ document.querySelectorAll('.esel.open').forEach(e=>e.classList.remove('open')); });\n\n/* ========== AFFIRMATIONS / NUDGES ========== */\nconst AFFIRMATIONS = [\n  \"I am building wealth one intentional decision at a time.\",\n  \"Money flows to me easily and abundantly.\",\n  \"I am in full control of my financial future.\",\n  \"Every rupee I save is a step toward my freedom.\",\n  \"I make smart, intentional money decisions every day.\",\n  \"Abundance is my natural state of being.\",\n  \"I release all fear and anxiety around money.\",\n  \"My savings grow stronger every single day.\",\n  \"I am worthy of financial prosperity and peace.\",\n  \"I attract opportunities to grow my wealth.\",\n  \"Financial freedom is not a dream, it is my destination.\",\n  \"I spend with intention and save with purpose.\",\n  \"I am proud of every small financial win.\",\n  \"Wealth is built by consistent daily actions.\",\n  \"My future self thanks me for saving today.\"\n];\nconst NUDGES = [\n  \"<b>Small wins matter.<\u002Fb> Even saving Rs.50 today adds up to Rs.18,000 by year end.\",\n  \"<b>Track it to crack it.<\u002Fb> People who log expenses save 20% more on average.\",\n  \"<b>Automate your savings.<\u002Fb> Set up an auto-transfer on payday.\",\n  \"<b>The latte factor is real.<\u002Fb> Rs.100/day x 365 = Rs.36,500. What is your Rs.100?\",\n  \"<b>One account per goal.<\u002Fb> Separate accounts make saving feel more real.\",\n  \"<b>Review weekly.<\u002Fb> 15 minutes every Sunday can change your financial year.\",\n  \"<b>Consistency beats intensity.<\u002Fb> Small daily habits beat big one-time efforts.\",\n  \"<b>Start your emergency fund today.<\u002Fb> Even Rs.500 is better than zero.\"\n];\nconst CATEGORIES = [\n  {v:\"food\",e:\"🍔\",n:\"Food\"},\n  {v:\"transport\",e:\"🚗\",n:\"Transport\"},\n  {v:\"shopping\",e:\"🛒\",n:\"Shopping\"},\n  {v:\"health\",e:\"💊\",n:\"Health\"},\n  {v:\"entertainment\",e:\"🎬\",n:\"Entertainment\"},\n  {v:\"other\",e:\"📦\",n:\"Other\"},\n];\nconst GOAL_CATS = [\n  {v:\"emergency\",e:\"🚨\",n:\"Emergency Fund\"},\n  {v:\"vacation\",e:\"✈️\",n:\"Vacation\"},\n  {v:\"medical\",e:\"🏥\",n:\"Medical\"},\n  {v:\"gifts\",e:\"🎁\",n:\"Gifts & Holidays\"},\n  {v:\"education\",e:\"📚\",n:\"Education\"},\n  {v:\"home\",e:\"🏠\",n:\"Home\"},\n  {v:\"vehicle\",e:\"🚗\",n:\"Vehicle\"},\n  {v:\"business\",e:\"💼\",n:\"Business\"},\n  {v:\"custom\",e:\"💰\",n:\"Custom\"},\n];\n\n/* ========== STREAK ========== */\nfunction calcStreak(){\n  let streak = 0;\n  const today = new Date(); today.setHours(0,0,0,0);\n  for(let i=0;i<365;i++){\n    const d = new Date(today); d.setDate(today.getDate()-i);\n    const k = \"daily_\"+ymd(d);\n    const data = getJSON(k, null);\n    const has = data && ((data.tasks && data.tasks.length>0) || (data.spends && data.spends.length>0));\n    if(has){ streak++; }\n    else if(i>0){ break; }\n    else { break; }\n  }\n  return streak;\n}\nfunction refreshStreakBadge(){\n  const s = calcStreak();\n  const b = $(\"#streakBadge\");\n  if(s>0){\n    b.style.display=\"\";\n    b.innerHTML = `🔥 <span id=\"streakNum\">${s}<\u002Fspan><span class=\"streak-label\"> day streak<\u002Fspan>`;\n  } else { b.style.display=\"none\"; }\n}\n\n/* ========== HEADER DATE ========== */\nfunction refreshHeaderDate(){\n  $(\"#headerDate\").textContent = new Date().toLocaleDateString(\"en-IN\",{weekday:\"long\",day:\"numeric\",month:\"long\",year:\"numeric\"});\n}\n\n/* ========== DARK MODE ========== */\nfunction applyDark(on){\n  document.documentElement.classList.toggle(\"dark\", on);\n  $(\"#dkKnob\").textContent = on ? \"🌙\" : \"☀️\";\n}\n$(\"#dkToggle\").onclick = ()=>{\n  const on = !document.documentElement.classList.contains(\"dark\");\n  applyDark(on);\n  setRaw(\"dk\", on?\"1\":\"0\");\n};\n\n/* ========== TABS ========== */\n$$(\"#tabsRow .tab\").forEach(t=>{\n  t.onclick = ()=>{\n    $$(\"#tabsRow .tab\").forEach(x=>x.classList.remove(\"active\"));\n    t.classList.add(\"active\");\n    currentTab = t.dataset.tab;\n    render();\n  };\n});\nfunction switchToTab(name){\n  $$(\"#tabsRow .tab\").forEach(x=>{\n    x.classList.toggle(\"active\", x.dataset.tab===name);\n  });\n  currentTab = name;\n  render();\n}\n\n/* ========== RENDER ROOT ========== */\nfunction render(){\n  refreshStreakBadge();\n  if(currentTab===\"daily\") renderDaily();\n  else if(currentTab===\"weekly\") renderWeekly();\n  else if(currentTab===\"monthly\") renderMonthly();\n  else if(currentTab===\"goals\") renderGoals();\n  else if(currentTab===\"insights\") renderInsights();\n  else if(currentTab===\"coach\") renderCoach();\n}\n\n/* =========================================== */\n/* ============== DAILY TAB ================== */\n/* =========================================== */\nfunction dailyData(d){\n  const k = \"daily_\"+ymd(d);\n  return getJSON(k, {tasks:[],spends:[],mood:\"\",win:\"\",improve:\"\",notes:\"\",bc:\"\",budget:0});\n}\nfunction saveDaily(d, data){\n  setJSON(\"daily_\"+ymd(d), data);\n}\n\nfunction renderDaily(){\n  const d = viewDate;\n  const data = dailyData(d);\n  const today = new Date(); today.setHours(0,0,0,0);\n  const yest = new Date(today); yest.setDate(today.getDate()-1);\n  const cmp = new Date(d); cmp.setHours(0,0,0,0);\n  let subLabel = \"\";\n  if(ymd(cmp)===ymd(today)) subLabel=\"Today\";\n  else if(ymd(cmp)===ymd(yest)) subLabel=\"Yesterday\";\n\n  const dateLabel = d.toLocaleDateString(\"en-IN\",{weekday:\"long\",day:\"numeric\",month:\"long\",year:\"numeric\"});\n\n  const tasksDone = data.tasks.filter(t=>t.done).length;\n  const tasksTotal = data.tasks.length;\n  const totalSpent = data.spends.reduce((s,x)=>s+Number(x.amt||0),0);\n  const budget = Number(data.budget||0);\n  const overBy = totalSpent - budget;\n  const budgetSub = budget>0\n    ? (overBy>0 ? `Over by ${fmt(overBy)} ⚠️` : `On track ✅`)\n    : \"No budget set\";\n  const moodDisp = data.mood || \"—\";\n\n  // Affirmation rotates by day-of-year offset\n  const dayIdx = Math.floor((d - new Date(d.getFullYear(),0,0))/86400000);\n  const affirmIdx = getJSON(\"affirmIdx_\"+ymd(d), dayIdx % AFFIRMATIONS.length);\n  const nudgeIdx = dayIdx % NUDGES.length;\n\n  $(\"#main\").innerHTML = `\n    <h1 class=\"page-title\" style=\"margin-bottom:20px\">☀️ Daily Plan<\u002Fh1>\n    <div class=\"date-nav\">\n      <button onclick=\"navDay(-1)\">‹<\u002Fbutton>\n      <div style=\"flex:1\">\n        <div class=\"date-main\">${dateLabel}<\u002Fdiv>\n        <div class=\"date-sub\">${subLabel}<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"navDay(1)\">›<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"stat-row\">\n      <div class=\"stat stat-clickable\" onclick=\"openTasksModal()\" title=\"Click to see tasks\">\n        <div class=\"label\">Tasks Done<\u002Fdiv>\n        <div class=\"val green\">${tasksDone}/${tasksTotal}<\u002Fdiv>\n        <div class=\"sub\">${tasksTotal>0?'View details →':'No tasks yet'}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat stat-clickable\" onclick=\"openSpendsModal()\" title=\"Click to see spending\">\n        <div class=\"label\">Spent Today<\u002Fdiv>\n        <div class=\"val coral\">${fmt(totalSpent)}<\u002Fdiv>\n        <div class=\"sub\">${data.spends.length>0?'View details →':'Nothing logged'}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat stat-budget\">\n        <div class=\"label\">Daily Budget<\u002Fdiv>\n        <div class=\"budget-edit-row\">\n          <span class=\"budget-currency\">${csym()}<\u002Fspan>\n          <input type=\"number\" class=\"budget-inline-input\" id=\"budgetInlineInput\" value=\"${budget||''}\" placeholder=\"0\" onchange=\"setDailyBudget(this.value)\" onkeydown=\"if(event.key==='Enter')this.blur()\" />\n        <\u002Fdiv>\n        <div class=\"sub ${budget>0?(overBy>0?'warn':'ok'):''}\">${budgetSub}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Mood<\u002Fdiv><div class=\"val\" style=\"font-family:'Plus Jakarta Sans';font-size:30px\">${moodDisp}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-auto\">\n      <div>\n        <!-- Top 3 money tasks -->\n        <div class=\"card\">\n          <div class=\"card-title\">Top 3 Money Tasks<\u002Fdiv>\n          <div class=\"list\" id=\"taskList\">\n            ${data.tasks.map((t,i)=>`\n              <div class=\"list-item\">\n                <div class=\"checkbox ${t.done?'checked':''}\" onclick=\"toggleTask(${i})\">${t.done?'✓':''}<\u002Fdiv>\n                <div class=\"task-text ${t.done?'done':''}\">${escapeHtml(t.text)}<\u002Fdiv>\n                <button class=\"x-btn\" onclick=\"deleteTask(${i})\">✕<\u002Fbutton>\n              <\u002Fdiv>\n            `).join(\"\") || `<div class=\"empty-state\">No tasks yet. Add your top money moves for today.<\u002Fdiv>`}\n          <\u002Fdiv>\n          <div class=\"form-row\">\n            <input id=\"newTask\" placeholder=\"e.g. Transfer ${csym()}500 to savings\" onkeydown=\"if(event.key==='Enter')addTask()\" />\n            <button class=\"btn primary\" onclick=\"addTask()\">Add<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Spending log -->\n        <div class=\"card\">\n          <div class=\"card-title\">Spending Log<\u002Fdiv>\n          <div class=\"list\">\n            ${data.spends.map((s,i)=>{\n              const c = CATEGORIES.find(x=>x.v===s.cat) || CATEGORIES[5];\n              return `<div class=\"list-item\">\n                <div style=\"font-size:20px\">${c.e}<\u002Fdiv>\n                <div class=\"grow\">\n                  <div style=\"font-weight:600\">${escapeHtml(s.name)}<\u002Fdiv>\n                  <div class=\"meta\">${c.n}<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"amt coral\">${fmt(s.amt)}<\u002Fdiv>\n                <button class=\"x-btn\" onclick=\"deleteSpend(${i})\">✕<\u002Fbutton>\n              <\u002Fdiv>`;\n            }).join(\"\") || `<div class=\"empty-state\">No spending logged today. Stay on track 💚<\u002Fdiv>`}\n          <\u002Fdiv>\n          <div class=\"form-row\">\n            <input id=\"spendName\" placeholder=\"What did you spend on?\" />\n          <\u002Fdiv>\n          <div class=\"form-row\">\n            <input id=\"spendAmt\" type=\"number\" placeholder=\"Amount (${csym()})\" style=\"flex:1\" />\n            ${emojiSelect(\"spendCat\", currentSpendCat, CATEGORIES, 0.6, true)}\n            <button class=\"btn primary\" onclick=\"addSpend()\">Log Spend<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid var(--border)\">\n            <label class=\"section-head\">Daily Budget (${csym()})<\u002Flabel>\n            <input type=\"number\" value=\"${budget||\"\"}\" placeholder=\"Set today's budget\" onchange=\"setDailyBudget(this.value)\" />\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Budget check -->\n        <div class=\"card\">\n          <div class=\"card-title\">Budget Check<\u002Fdiv>\n          <label class=\"section-head\" style=\"margin-top:0\">Did I stick to my budget today?<\u002Flabel>\n          <div class=\"bc-row\">\n            <button class=\"bc-btn yes ${data.bc==='yes'?'selected':''}\" onclick=\"setBC('yes')\">✅ Yes!<\u002Fbutton>\n            <button class=\"bc-btn no ${data.bc==='no'?'selected':''}\" onclick=\"setBC('no')\">❌ Not quite<\u002Fbutton>\n          <\u002Fdiv>\n          <label class=\"section-head\">One money win today<\u002Flabel>\n          <input type=\"text\" value=\"${escapeAttr(data.win)}\" placeholder=\"e.g. Skipped the coffee\" onchange=\"setDailyField('win', this.value)\" />\n          <label class=\"section-head\">One thing to improve<\u002Flabel>\n          <input type=\"text\" value=\"${escapeAttr(data.improve)}\" placeholder=\"e.g. Pack lunch tomorrow\" onchange=\"setDailyField('improve', this.value)\" />\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <!-- Affirmation -->\n        <div class=\"affirm\">\n          <div class=\"affirm-text\">${AFFIRMATIONS[affirmIdx]}<\u002Fdiv>\n          <button class=\"btn primary\" onclick=\"newAffirmation()\">✨ New Affirmation<\u002Fbutton>\n        <\u002Fdiv>\n\n        <!-- Money mood -->\n        <div class=\"card\">\n          <div class=\"card-title\">Money Mood<\u002Fdiv>\n          <label class=\"section-head\" style=\"margin-top:0\">How are you feeling about finances today?<\u002Flabel>\n          <div class=\"mood-row\">\n            ${[\"😰\",\"😕\",\"😐\",\"🙂\",\"😄\",\"🤑\"].map(e=>`\n              <button class=\"mood-btn ${data.mood===e?'selected':''}\" onclick=\"setMood('${e}')\">${e}<\u002Fbutton>\n            `).join(\"\")}\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Daily notes -->\n        <div class=\"card\">\n          <div class=\"card-title\">Daily Notes<\u002Fdiv>\n          <textarea rows=\"5\" placeholder=\"Reflections, observations, thoughts about money today...\" onchange=\"setDailyField('notes', this.value)\">${escapeHtml(data.notes||\"\")}<\u002Ftextarea>\n        <\u002Fdiv>\n\n        <!-- Nudge -->\n        <div class=\"card\" style=\"background:none;border:none;box-shadow:none;padding:0\">\n          <div class=\"nudge\">${NUDGES[nudgeIdx]}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction navDay(delta){\n  const d = new Date(viewDate);\n  d.setDate(d.getDate()+delta);\n  viewDate = d;\n  renderDaily();\n}\nfunction addTask(){\n  const inp = $(\"#newTask\");\n  const v = inp.value.trim();\n  if(!v) return;\n  const data = dailyData(viewDate);\n  data.tasks.push({text:v, done:false});\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction toggleTask(i){\n  const data = dailyData(viewDate);\n  data.tasks[i].done = !data.tasks[i].done;\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction deleteTask(i){\n  const data = dailyData(viewDate);\n  data.tasks.splice(i,1);\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction addSpend(){\n  const name = $(\"#spendName\").value.trim();\n  const amt = Number($(\"#spendAmt\").value||0);\n  const cat = document.getElementById(\"spendCat\").dataset.value;\n  if(!name || !amt) return;\n  const data = dailyData(viewDate);\n  data.spends.push({name, amt, cat});\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction deleteSpend(i){\n  const data = dailyData(viewDate);\n  data.spends.splice(i,1);\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction setDailyBudget(v){\n  const data = dailyData(viewDate);\n  data.budget = Number(v||0);\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction setBC(v){\n  const data = dailyData(viewDate);\n  data.bc = v;\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction setDailyField(f, v){\n  const data = dailyData(viewDate);\n  data[f] = v;\n  saveDaily(viewDate, data);\n}\nfunction setMood(e){\n  const data = dailyData(viewDate);\n  data.mood = e;\n  saveDaily(viewDate, data);\n  renderDaily();\n}\nfunction newAffirmation(){\n  const idx = Math.floor(Math.random()*AFFIRMATIONS.length);\n  setJSON(\"affirmIdx_\"+ymd(viewDate), idx);\n  renderDaily();\n}\n\n/* =========================================== */\n/* ============== WEEKLY TAB ================= */\n/* =========================================== */\nfunction weekKey(d){ return \"weekly_\"+ymd(mondayOf(d)); }\nfunction weeklyData(d){\n  return getJSON(weekKey(d), {ie:[],bills:[],win:\"\",lesson:\"\",focus:\"\"});\n}\nfunction saveWeekly(d, data){ setJSON(weekKey(d), data); }\n\nfunction renderWeekly(){\n  const mon = mondayOf(viewWeekDate);\n  const sun = new Date(mon); sun.setDate(mon.getDate()+6);\n  const fmtDay = d => d.toLocaleDateString(\"en-IN\",{day:\"numeric\",month:\"short\"});\n  const label = `${fmtDay(mon)} – ${fmtDay(sun)}`;\n\n  const data = weeklyData(viewWeekDate);\n  const income = data.ie.filter(x=>x.type===\"income\").reduce((s,x)=>s+Number(x.amt||0),0);\n  const expenses = data.ie.filter(x=>x.type===\"expense\").reduce((s,x)=>s+Number(x.amt||0),0);\n  const net = income - expenses;\n  const unpaidBills = data.bills.filter(b=>!b.paid).length;\n\n  // build week grid days\n  const today = new Date(); today.setHours(0,0,0,0);\n  const days = [];\n  for(let i=0;i<7;i++){\n    const dd = new Date(mon); dd.setDate(mon.getDate()+i);\n    const dk = \"daily_\"+ymd(dd);\n    const dd_data = getJSON(dk, null);\n    const has = dd_data && ((dd_data.tasks && dd_data.tasks.length>0) || (dd_data.spends && dd_data.spends.length>0));\n    days.push({\n      d: dd,\n      label: dd.toLocaleDateString(\"en-IN\",{weekday:\"short\"}),\n      dnum: dd.getDate(),\n      isToday: ymd(dd)===ymd(today),\n      has\n    });\n  }\n\n  // savings goals (live)\n  const goals = getJSON(\"savings_goals\", []).slice(0,5);\n\n  $(\"#main\").innerHTML = `\n    <h1 class=\"page-title\" style=\"margin-bottom:20px\">📅 Weekly Review<\u002Fh1>\n    <div class=\"date-nav\">\n      <button onclick=\"navWeek(-1)\">‹<\u002Fbutton>\n      <div style=\"flex:1\"><div class=\"date-main\">${label}<\u002Fdiv><\u002Fdiv>\n      <button onclick=\"navWeek(1)\">›<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"week-grid\">\n      ${days.map(x=>`\n        <div class=\"week-day ${x.isToday?'today':''}\">\n          <div class=\"dn\">${x.label}<\u002Fdiv>\n          <div class=\"dd\">${x.dnum}<\u002Fdiv>\n          ${x.has?'<div class=\"dot\"><\u002Fdiv>':''}\n        <\u002Fdiv>\n      `).join(\"\")}\n    <\u002Fdiv>\n\n    <div class=\"stat-row\">\n      <div class=\"stat\"><div class=\"label\">Weekly Income<\u002Fdiv><div class=\"val green\">${fmt(income)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Weekly Expenses<\u002Fdiv><div class=\"val coral\">${fmt(expenses)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Net Saved<\u002Fdiv><div class=\"val ${net>=0?'green':'coral'}\">${fmt(net)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Bills Due<\u002Fdiv><div class=\"val\">${unpaidBills}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-2\">\n      <div class=\"card\">\n        <div class=\"card-title\">Income & Expenses<\u002Fdiv>\n        <table class=\"tbl\">\n          <thead><tr><th>Description<\u002Fth><th>Type<\u002Fth><th class=\"right\">Amount<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            ${data.ie.length===0? `<tr><td colspan=\"4\"><div class=\"empty-state\">No transactions yet this week<\u002Fdiv><\u002Ftd><\u002Ftr>` :\n              data.ie.map((x,i)=>`\n                <tr>\n                  <td>${escapeHtml(x.desc)}<\u002Ftd>\n                  <td><span class=\"badge ${x.type}\">${x.type}<\u002Fspan><\u002Ftd>\n                  <td class=\"right\" style=\"color:${x.type==='income'?'var(--accent2)':'var(--coral)'}\">${fmt(x.amt)}<\u002Ftd>\n                  <td><button class=\"x-btn\" onclick=\"delIE(${i})\">✕<\u002Fbutton><\u002Ftd>\n                <\u002Ftr>\n              `).join(\"\")\n            }\n          <\u002Ftbody>\n        <\u002Ftable>\n        <div class=\"form-row\">\n          <input id=\"ieDesc\" placeholder=\"Description\" />\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <select id=\"ieType\" style=\"flex:1\">\n            <option value=\"income\">Income<\u002Foption>\n            <option value=\"expense\">Expense<\u002Foption>\n          <\u002Fselect>\n          <input id=\"ieAmt\" type=\"number\" placeholder=\"Amount (${csym()})\" style=\"flex:1\" />\n          <button class=\"btn primary\" onclick=\"addIE()\">Add<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-title\">Bills Due This Week<\u002Fdiv>\n        <div class=\"list\">\n          ${data.bills.length===0? `<div class=\"empty-state\">No bills logged this week<\u002Fdiv>` :\n            data.bills.map((b,i)=>`\n              <div class=\"list-item\">\n                <div class=\"checkbox ${b.paid?'checked':''}\" onclick=\"toggleBill(${i})\">${b.paid?'✓':''}<\u002Fdiv>\n                <div class=\"grow\">\n                  <div class=\"task-text ${b.paid?'done':''}\" style=\"font-weight:600\">${escapeHtml(b.name)}<\u002Fdiv>\n                  <div class=\"meta\">Due ${b.due||'—'}<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"amt ${b.paid?'':'coral'}\">${fmt(b.amt)}<\u002Fdiv>\n                <button class=\"x-btn\" onclick=\"delBill(${i})\">✕<\u002Fbutton>\n              <\u002Fdiv>\n            `).join(\"\")\n          }\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <input id=\"billName\" placeholder=\"Bill name\" />\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <input id=\"billAmt\" type=\"number\" placeholder=\"Amount (${csym()})\" style=\"flex:1\" />\n          <input id=\"billDue\" type=\"date\" style=\"flex:1\" />\n          <button class=\"btn primary\" onclick=\"addBill()\">Add<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-title\">Savings Progress <button class=\"link-btn\" onclick=\"switchToTab('goals')\">View all →<\u002Fbutton><\u002Fdiv>\n        ${goals.length===0 ? `<div class=\"empty-state\">No goals yet. Add goals in the Savings Goals tab.<\u002Fdiv>` :\n          goals.map((g,i)=>{\n            const pct = Math.min(100, Math.round((g.saved/g.goal||0)*100));\n            const cls = [\"\",\"v\",\"a\",\"c\"][i%4];\n            return `\n              <div style=\"margin-bottom:14px\">\n                <div style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px\">\n                  <span>${g.emoji||\"💰\"} ${escapeHtml(g.name)}<\u002Fspan>\n                  <span>${pct}%<\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"bar tall ${cls}\"><div class=\"fill\" style=\"width:${pct}%\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:11px;color:var(--muted);margin-top:4px\">${fmt(g.saved)} of ${fmt(g.goal)}<\u002Fdiv>\n              <\u002Fdiv>\n            `;\n          }).join(\"\")\n        }\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-title\">Weekly Reflection<\u002Fdiv>\n        <div class=\"reflection\">\n          <label>💰 My money win this week<\u002Flabel>\n          <textarea rows=\"2\" placeholder=\"What did I do well?\" onchange=\"setWeeklyField('win',this.value)\">${escapeHtml(data.win||\"\")}<\u002Ftextarea>\n        <\u002Fdiv>\n        <div class=\"reflection\">\n          <label>📚 What I learned about money<\u002Flabel>\n          <textarea rows=\"2\" placeholder=\"A lesson, insight, or aha moment...\" onchange=\"setWeeklyField('lesson',this.value)\">${escapeHtml(data.lesson||\"\")}<\u002Ftextarea>\n        <\u002Fdiv>\n        <div class=\"reflection\">\n          <label>🎯 Next week's financial focus<\u002Flabel>\n          <input type=\"text\" placeholder=\"One clear focus...\" value=\"${escapeAttr(data.focus||\"\")}\" onchange=\"setWeeklyField('focus',this.value)\" />\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction navWeek(delta){\n  const d = new Date(viewWeekDate);\n  d.setDate(d.getDate()+(delta*7));\n  viewWeekDate = d;\n  renderWeekly();\n}\nfunction addIE(){\n  const desc = $(\"#ieDesc\").value.trim();\n  const type = $(\"#ieType\").value;\n  const amt = Number($(\"#ieAmt\").value||0);\n  if(!desc||!amt) return;\n  const data = weeklyData(viewWeekDate);\n  data.ie.push({desc,type,amt});\n  saveWeekly(viewWeekDate, data);\n  renderWeekly();\n}\nfunction delIE(i){\n  const data = weeklyData(viewWeekDate);\n  data.ie.splice(i,1);\n  saveWeekly(viewWeekDate, data);\n  renderWeekly();\n}\nfunction addBill(){\n  const name = $(\"#billName\").value.trim();\n  const amt = Number($(\"#billAmt\").value||0);\n  const due = $(\"#billDue\").value;\n  if(!name||!amt) return;\n  const data = weeklyData(viewWeekDate);\n  data.bills.push({name, amt, due, paid:false});\n  saveWeekly(viewWeekDate, data);\n  renderWeekly();\n}\nfunction toggleBill(i){\n  const data = weeklyData(viewWeekDate);\n  data.bills[i].paid = !data.bills[i].paid;\n  saveWeekly(viewWeekDate, data);\n  renderWeekly();\n}\nfunction delBill(i){\n  const data = weeklyData(viewWeekDate);\n  data.bills.splice(i,1);\n  saveWeekly(viewWeekDate, data);\n  renderWeekly();\n}\nfunction setWeeklyField(f,v){\n  const data = weeklyData(viewWeekDate);\n  data[f] = v;\n  saveWeekly(viewWeekDate, data);\n}\n\n/* =========================================== */\n/* ============== MONTHLY TAB ================ */\n/* =========================================== */\nfunction monthlyData(d){\n  return getJSON(\"monthly_\"+monthKey(d), {budget:[],assets:[],liabilities:[],goals:[],win:\"\",improve:\"\",priority:\"\",income:0});\n}\nfunction saveMonthly(d, data){ setJSON(\"monthly_\"+monthKey(d), data); }\n\nfunction renderMonthly(){\n  const d = viewMonthDate;\n  const label = d.toLocaleDateString(\"en-IN\",{month:\"long\",year:\"numeric\"});\n  const data = monthlyData(d);\n  const income = Number(data.income||0);\n  const totalSpent = data.budget.reduce((s,b)=>s+Number(b.spent||0),0);\n  const saved = income - totalSpent;\n  const saveRate = income>0 ? Math.round((saved/income)*100) : 0;\n\n  const totalAssets = data.assets.reduce((s,a)=>s+Number(a.val||0),0);\n  const totalLiab = data.liabilities.reduce((s,l)=>s+Number(l.val||0),0);\n  const netWorth = totalAssets - totalLiab;\n\n  $(\"#main\").innerHTML = `\n    <h1 class=\"page-title\" style=\"margin-bottom:20px\">🗓️ Monthly Overview<\u002Fh1>\n    <div class=\"date-nav\">\n      <button onclick=\"navMonth(-1)\">‹<\u002Fbutton>\n      <div style=\"flex:1\"><div class=\"date-main\">${label}<\u002Fdiv><\u002Fdiv>\n      <button onclick=\"navMonth(1)\">›<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"stat-row\">\n      <div class=\"stat\">\n        <div class=\"label\">Monthly Income<\u002Fdiv>\n        <input type=\"number\" value=\"${income||\"\"}\" placeholder=\"0\" style=\"border:none;padding:0;background:transparent;font-family:'Fraunces';font-size:24px;font-weight:700;color:var(--accent2);margin-top:6px\" onchange=\"setMonthlyIncome(this.value)\" />\n      <\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Total Spent<\u002Fdiv><div class=\"val coral\">${fmt(totalSpent)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Saved<\u002Fdiv><div class=\"val ${saved>=0?'green':'coral'}\">${fmt(saved)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Save Rate<\u002Fdiv><div class=\"val ${saveRate>=20?'green':''}\">${saveRate}%<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-2\">\n      <div class=\"card\">\n        <div class=\"card-title\">Monthly Budget<\u002Fdiv>\n        ${data.budget.length===0? `<div class=\"empty-state\">No budget categories yet. Add one below.<\u002Fdiv>` :\n          data.budget.map((b,i)=>{\n            const pct = b.budget>0 ? Math.min(120, Math.round((b.spent/b.budget)*100)) : 0;\n            const cls = b.spent>b.budget? \"c\" : (pct>=80? \"a\" : \"\");\n            return `\n              <div style=\"margin-bottom:14px\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;margin-bottom:6px\">\n                  <span>${escapeHtml(b.name)}<\u002Fspan>\n                  <span style=\"display:flex;gap:8px;align-items:center\">\n                    <span style=\"font-family:'Fraunces';font-weight:700\">${fmt(b.spent)} / ${fmt(b.budget)}<\u002Fspan>\n                    <button class=\"x-btn\" onclick=\"delBudget(${i})\">✕<\u002Fbutton>\n                  <\u002Fspan>\n                <\u002Fdiv>\n                <div class=\"bar tall ${cls}\"><div class=\"fill\" style=\"width:${Math.min(100,pct)}%\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            `;\n          }).join(\"\")\n        }\n        <div class=\"form-row\">\n          <input id=\"budName\" placeholder=\"Category (e.g. Groceries)\" />\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <input id=\"budBudget\" type=\"number\" placeholder=\"Budget (${csym()})\" style=\"flex:1\" />\n          <input id=\"budSpent\" type=\"number\" placeholder=\"Spent (${csym()})\" style=\"flex:1\" />\n          <button class=\"btn primary\" onclick=\"addBudget()\">Add<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-title\">Net Worth Snapshot<\u002Fdiv>\n        <div class=\"section-head\">Assets<\u002Fdiv>\n        <div class=\"list\">\n          ${data.assets.map((a,i)=>`\n            <div class=\"list-item\">\n              <div class=\"grow\"><div style=\"font-weight:600\">${escapeHtml(a.name)}<\u002Fdiv><\u002Fdiv>\n              <div class=\"amt green\">${fmt(a.val)}<\u002Fdiv>\n              <button class=\"x-btn\" onclick=\"delAsset(${i})\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          `).join(\"\") || `<div class=\"empty-state\">No assets added<\u002Fdiv>`}\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <input id=\"assetName\" placeholder=\"e.g. Savings Account\" style=\"flex:2\" />\n          <input id=\"assetVal\" type=\"number\" placeholder=\"${csym()}\" style=\"flex:1\" />\n          <button class=\"btn primary\" onclick=\"addAsset()\">Add<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"section-head\" style=\"margin-top:16px\">Liabilities<\u002Fdiv>\n        <div class=\"list\">\n          ${data.liabilities.map((l,i)=>`\n            <div class=\"list-item\">\n              <div class=\"grow\"><div style=\"font-weight:600\">${escapeHtml(l.name)}<\u002Fdiv><\u002Fdiv>\n              <div class=\"amt coral\">${fmt(l.val)}<\u002Fdiv>\n              <button class=\"x-btn\" onclick=\"delLiab(${i})\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          `).join(\"\") || `<div class=\"empty-state\">No liabilities added<\u002Fdiv>`}\n        <\u002Fdiv>\n        <div class=\"form-row\">\n          <input id=\"liabName\" placeholder=\"e.g. Credit Card\" style=\"flex:2\" />\n          <input id=\"liabVal\" type=\"number\" placeholder=\"${csym()}\" style=\"flex:1\" />\n          <button class=\"btn primary\" onclick=\"addLiab()\">Add<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"nw-box\">\n          <div class=\"lbl\">Net Worth<\u002Fdiv>\n          <div class=\"val ${netWorth<0?'coral':''}\">${fmt(netWorth)}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-title\">Monthly Goals<\u002Fdiv>\n        ${data.goals.length===0 ? `<div class=\"empty-state\">No monthly goals yet.<\u002Fdiv>` :\n          data.goals.map((g,i)=>{\n            const cls = [\"\",\"v\",\"a\",\"c\"][i%4];\n            const barCls = [\"\",\"v\",\"a\",\"c\"][i%4];\n            return `\n              <div class=\"mgoal ${cls}\">\n                <div class=\"head\">\n                  <div>\n                    <div class=\"ttl\">${escapeHtml(g.title)}<\u002Fdiv>\n                    <div class=\"meta\">Target: ${g.target||'—'}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button class=\"x-btn\" onclick=\"delMGoal(${i})\">✕<\u002Fbutton>\n                <\u002Fdiv>\n                <div class=\"bar tall ${barCls}\"><div class=\"fill\" style=\"width:${g.pct||0}%\"><\u002Fdiv><\u002Fdiv>\n                <input type=\"range\" min=\"0\" max=\"100\" value=\"${g.pct||0}\" oninput=\"setMGoalPct(${i}, this.value)\" />\n                <div class=\"pct\">${g.pct||0}% complete<\u002Fdiv>\n              <\u002Fdiv>\n            `;\n          }).join(\"\")\n        }\n        <div class=\"form-row\">\n          <input id=\"mgTitle\" placeholder=\"Goal title\" style=\"flex:2\" />\n          <input id=\"mgTarget\" type=\"date\" style=\"flex:1\" />\n          <button class=\"btn primary\" onclick=\"addMGoal()\">+ Add Goal<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-title\">Monthly Reflection<\u002Fdiv>\n        <div class=\"reflection\">\n          <label>🏆 Biggest financial win this month<\u002Flabel>\n          <textarea rows=\"2\" onchange=\"setMonthlyField('win',this.value)\">${escapeHtml(data.win||\"\")}<\u002Ftextarea>\n        <\u002Fdiv>\n        <div class=\"reflection\">\n          <label>🔄 What I'll do differently next month<\u002Flabel>\n          <textarea rows=\"2\" onchange=\"setMonthlyField('improve',this.value)\">${escapeHtml(data.improve||\"\")}<\u002Ftextarea>\n        <\u002Fdiv>\n        <div class=\"reflection\">\n          <label>⭐ Next month's #1 priority<\u002Flabel>\n          <input type=\"text\" value=\"${escapeAttr(data.priority||\"\")}\" onchange=\"setMonthlyField('priority',this.value)\" />\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction navMonth(delta){\n  const d = new Date(viewMonthDate);\n  d.setMonth(d.getMonth()+delta);\n  viewMonthDate = d;\n  renderMonthly();\n}\nfunction setMonthlyIncome(v){\n  const data = monthlyData(viewMonthDate);\n  data.income = Number(v||0);\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction addBudget(){\n  const name = $(\"#budName\").value.trim();\n  const budget = Number($(\"#budBudget\").value||0);\n  const spent = Number($(\"#budSpent\").value||0);\n  if(!name||!budget) return;\n  const data = monthlyData(viewMonthDate);\n  data.budget.push({name,budget,spent});\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction delBudget(i){\n  const data = monthlyData(viewMonthDate);\n  data.budget.splice(i,1);\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction addAsset(){\n  const name = $(\"#assetName\").value.trim();\n  const val = Number($(\"#assetVal\").value||0);\n  if(!name||!val) return;\n  const data = monthlyData(viewMonthDate);\n  data.assets.push({name,val});\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction delAsset(i){\n  const data = monthlyData(viewMonthDate);\n  data.assets.splice(i,1);\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction addLiab(){\n  const name = $(\"#liabName\").value.trim();\n  const val = Number($(\"#liabVal\").value||0);\n  if(!name||!val) return;\n  const data = monthlyData(viewMonthDate);\n  data.liabilities.push({name,val});\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction delLiab(i){\n  const data = monthlyData(viewMonthDate);\n  data.liabilities.splice(i,1);\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction addMGoal(){\n  const title = $(\"#mgTitle\").value.trim();\n  const target = $(\"#mgTarget\").value;\n  if(!title) return;\n  const data = monthlyData(viewMonthDate);\n  data.goals.push({title,target,pct:0});\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction delMGoal(i){\n  const data = monthlyData(viewMonthDate);\n  data.goals.splice(i,1);\n  saveMonthly(viewMonthDate, data);\n  renderMonthly();\n}\nfunction setMGoalPct(i, v){\n  const data = monthlyData(viewMonthDate);\n  data.goals[i].pct = Number(v);\n  saveMonthly(viewMonthDate, data);\n  // soft re-render text only\n  renderMonthly();\n}\nfunction setMonthlyField(f,v){\n  const data = monthlyData(viewMonthDate);\n  data[f] = v;\n  saveMonthly(viewMonthDate, data);\n}\n\n/* =========================================== */\n/* =========== SAVINGS GOALS TAB ============= */\n/* =========================================== */\nfunction getGoals(){ return getJSON(\"savings_goals\", []); }\nfunction setGoals(g){ setJSON(\"savings_goals\", g); }\n\nfunction renderGoals(){\n  const goals = getGoals();\n  const totalGoals = goals.length;\n  const totalSaved = goals.reduce((s,g)=>s+Number(g.saved||0),0);\n  const totalTarget = goals.reduce((s,g)=>s+Number(g.goal||0),0);\n  const overallPct = totalTarget>0 ? Math.round((totalSaved/totalTarget)*100) : 0;\n\n  $(\"#main\").innerHTML = `\n    <h1 class=\"page-title\" style=\"margin-bottom:20px\">🎯 Savings Goals<\u002Fh1>\n    <div class=\"stat-row\">\n      <div class=\"stat\"><div class=\"label\">Total Goals<\u002Fdiv><div class=\"val\">${totalGoals}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Total Saved<\u002Fdiv><div class=\"val green\">${fmt(totalSaved)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Total Target<\u002Fdiv><div class=\"val\">${fmt(totalTarget)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"label\">Overall Progress<\u002Fdiv><div class=\"val green\">${overallPct}%<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\">\n      <div class=\"card-title\">Add a Savings Goal<\u002Fdiv>\n      <div class=\"form-row\">\n        <input id=\"sgName\" placeholder=\"Goal name (e.g. Emergency Fund)\" />\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <input id=\"sgGoal\" type=\"number\" placeholder=\"Goal Amount (${csym()})\" style=\"flex:1\" />\n        <input id=\"sgSaved\" type=\"number\" placeholder=\"Already Saved (${csym()})\" style=\"flex:1\" />\n        <input id=\"sgMonthly\" type=\"number\" placeholder=\"Monthly (${csym()})\" style=\"flex:1\" />\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <input id=\"sgTarget\" type=\"date\" style=\"flex:1\" />\n        ${emojiSelect(\"sgCat\", currentGoalCat, GOAL_CATS, 0.6)}\n        <button class=\"btn primary\" onclick=\"addSavingsGoal()\">+ Add Savings Goal<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      ${goals.length===0 ? `<div class=\"empty-state\" style=\"padding:36px\">No savings goals yet. Add your first goal above to get started! 🌱<\u002Fdiv>` :\n        goals.map((g,i)=>{\n          const pct = g.goal>0 ? Math.min(100, Math.round((g

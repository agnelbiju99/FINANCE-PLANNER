.saved/g.goal)*100)) : 0;\n          const left = Math.max(0, g.goal - g.saved);\n          const cls = [\"\",\"v\",\"a\",\"c\"][i%4];\n          const monthlyTargetLine = (g.monthly||g.target) ? `${g.monthly?`${fmt(g.monthly)}/mo`:\"\"}${g.monthly&&g.target?\" · \":\"\"}${g.target?`Target: ${g.target}`:\"\"}` : \"\";\n          return `\n            <div class=\"sg-card ${cls}\">\n              <div class=\"sg-head\">\n                <div style=\"flex:1\">\n                  <div class=\"sg-name\">${g.emoji||\"💰\"} ${escapeHtml(g.name)}<\u002Fdiv>\n                  <div class=\"sg-saved\">${fmt(g.saved||0)}<\u002Fdiv>\n                  <div class=\"sg-of\">of ${fmt(g.goal)} goal<\u002Fdiv>\n                  ${monthlyTargetLine?`<div class=\"sg-meta\">${monthlyTargetLine}<\u002Fdiv>`:\"\"}\n                <\u002Fdiv>\n                <div>\n                  <div class=\"sg-pct\">${pct}%<\u002Fdiv>\n                  <div class=\"sg-left\">${fmt(left)} left<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"bar tall ${cls}\"><div class=\"fill\" style=\"width:${pct}%\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"sg-actions\">\n                <button class=\"btn ghost-green\" onclick=\"promptAddSavings(${i})\">+ Add Savings<\u002Fbutton>\n                <button class=\"btn ghost\" onclick=\"promptEditGoal(${i})\">✏️ Edit<\u002Fbutton>\n                <button class=\"btn danger\" onclick=\"removeGoal(${i})\">✕ Remove<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          `;\n        }).join(\"\")\n      }\n    <\u002Fdiv>\n  `;\n}\n\nfunction addSavingsGoal(){\n  const name = $(\"#sgName\").value.trim();\n  const goal = Number($(\"#sgGoal\").value||0);\n  const saved = Number($(\"#sgSaved\").value||0);\n  const monthly = Number($(\"#sgMonthly\").value||0);\n  const target = $(\"#sgTarget\").value;\n  const sgEl = document.getElementById(\"sgCat\");\n  const sgOpt = sgEl.querySelector(`.esel-opt[data-v=\"${sgEl.dataset.value}\"]`);\n  const emoji = sgOpt.dataset.emoji;\n  if(!name||!goal) { alert(\"Please enter a goal name and amount.\"); return; }\n  const goals = getGoals();\n  goals.push({name, goal, saved, monthly, target, emoji});\n  setGoals(goals);\n  checkMilestone(goals.length-1, 0, saved, goal, name);\n  renderGoals();\n}\nfunction promptAddSavings(i){\n  const goals = getGoals();\n  const amt = prompt(`Add to \"${goals[i].name}\":\\nHow much did you save?`, \"\");\n  if(amt===null) return;\n  const n = Number(amt);\n  if(!n||n<=0) return;\n  const old = Number(goals[i].saved||0);\n  goals[i].saved = old + n;\n  setGoals(goals);\n  checkMilestone(i, old, goals[i].saved, goals[i].goal, goals[i].name);\n  renderGoals();\n}\nfunction promptEditGoal(i){\n  const goals = getGoals();\n  const newName = prompt(\"Edit goal name:\", goals[i].name);\n  if(newName===null) return;\n  const newGoal = prompt(\"Edit goal amount (\"+csym()+\"):\", goals[i].goal);\n  if(newGoal===null) return;\n  const newSaved = prompt(\"Edit saved amount (\"+csym()+\"):\", goals[i].saved);\n  if(newSaved===null) return;\n  const old = Number(goals[i].saved||0);\n  goals[i].name = newName.trim() || goals[i].name;\n  goals[i].goal = Number(newGoal)||goals[i].goal;\n  goals[i].saved = Number(newSaved)||0;\n  setGoals(goals);\n  checkMilestone(i, old, goals[i].saved, goals[i].goal, goals[i].name);\n  renderGoals();\n}\nfunction removeGoal(i){\n  if(!confirm(\"Remove this goal?\")) return;\n  const goals = getGoals();\n  goals.splice(i,1);\n  setGoals(goals);\n  renderGoals();\n}\n\n/* ===== Milestone system ===== */\nfunction checkMilestone(idx, oldSaved, newSaved, goal, name){\n  if(!goal) return;\n  const oldPct = (oldSaved/goal)*100;\n  const newPct = (newSaved/goal)*100;\n  const milestones = [25,50,75,100];\n  const key = \"ms_\"+name.replace(/\\s+/g,\"_\").toLowerCase();\n  const lastFired = Number(localStorage.getItem(key)||0);\n  for(const m of milestones){\n    if(newPct>=m && oldPct<m && lastFired<m){\n      celebrate(name, m);\n      localStorage.setItem(key, m);\n      break;\n    }\n  }\n}\nfunction celebrate(name, pct){\n  // Toast\n  const t = $(\"#milestoneToast\");\n  const msgs = {\n    25:\"You're 25% there! Keep going 💪\",\n    50:\"Halfway! You're crushing it 🎯\",\n    75:\"75%! Almost there 🚀\",\n    100:\"GOAL REACHED! Time to celebrate 🏆\"\n  };\n  t.innerHTML = `🎉 <strong>${escapeHtml(name)}<\u002Fstrong> — ${msgs[pct]}`;\n  t.classList.add(\"show\");\n  setTimeout(()=>t.classList.remove(\"show\"), 4000);\n\n  // Confetti\n  const palette = [\"#2DBD6E\",\"#1A9E56\",\"#7C5CBF\",\"#F59E0B\",\"#F4645F\",\"#FCD34D\",\"#9B7EE0\",\"#F8A09D\"];\n  for(let i=0;i<55;i++){\n    const c = document.createElement(\"div\");\n    c.className = \"cp\";\n    const size = 6 + Math.random()*10;\n    c.style.left = Math.random()*100+\"vw\";\n    c.style.width = size+\"px\";\n    c.style.height = size+\"px\";\n    c.style.background = palette[Math.floor(Math.random()*palette.length)];\n    c.style.borderRadius = Math.random()<0.5 ? \"50%\" : \"2px\";\n    c.style.animationDuration = (1.5+Math.random()*2)+\"s\";\n    c.style.animationDelay = (Math.random()*0.5)+\"s\";\n    document.body.appendChild(c);\n    setTimeout(()=>c.remove(), 4000);\n  }\n}\n\n/* =========================================== */\n/* =========== SMART INSIGHTS ================ */\n/* =========================================== */\nfunction renderInsights(){\n  $(\"#main\").innerHTML = `\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:20px\">\n      <h1 class=\"page-title\">📊 Smart Insights<\u002Fh1>\n      <button class=\"btn primary\" onclick=\"renderInsights()\">🔄 Refresh Insights<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"insightsBody\">\n      <div class=\"empty-state\" style=\"padding:36px\">⚙️ Analyzing your data...<\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  setTimeout(()=>{\n    $(\"#insightsBody\").innerHTML = buildInsights();\n  }, 600);\n}\n\nfunction buildInsights(){\n  const out = [];\n  // Streak\n  const streak = calcStreak();\n  if(streak>0){\n    out.push(insightCard(\"🔥\",\"\",`${streak}-Day Logging Streak!`,\n      `You've been showing up for your money <span class=\"ih\">${streak} days in a row<\u002Fspan>. Consistency is the real wealth-building skill.`));\n  }\n  // Budget health (today)\n  const today = dailyData(new Date());\n  const todaySpent = today.spends.reduce((s,x)=>s+Number(x.amt||0),0);\n  if(today.budget>0){\n    const left = today.budget - todaySpent;\n    const pct = Math.round(((today.budget-todaySpent)/today.budget)*100);\n    if(left>=0){\n      out.push(insightCard(\"✅\",\"\",`${pct}% of Budget Remaining`,\n        `You have <span class=\"ih\">${fmt(left)}<\u002Fspan> left out of ${fmt(today.budget)} today. Nice work!`));\n    } else {\n      out.push(insightCard(\"⚠️\",\"c\",`Over Budget by ${fmt(-left)}`,\n        `You're <span class=\"ih c\">${fmt(-left)} over<\u002Fspan> your ${fmt(today.budget)} budget today. Consider a no-spend day tomorrow.`));\n    }\n  }\n  // Top spending category (this week)\n  const week = weeklyData(new Date());\n  const dailySpendsThisWeek = [];\n  const mon = mondayOf(new Date());\n  for(let i=0;i<7;i++){\n    const dd = new Date(mon); dd.setDate(mon.getDate()+i);\n    const dd_data = getJSON(\"daily_\"+ymd(dd), null);\n    if(dd_data && dd_data.spends) dd_data.spends.forEach(s=>dailySpendsThisWeek.push(s));\n  }\n  if(dailySpendsThisWeek.length>0){\n    const byCat = {};\n    dailySpendsThisWeek.forEach(s=>{ byCat[s.cat]=(byCat[s.cat]||0)+Number(s.amt||0); });\n    const top = Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];\n    const cat = CATEGORIES.find(c=>c.v===top[0]) || CATEGORIES[5];\n    out.push(insightCard(\"📈\",\"a\",`Biggest Spend: ${cat.n}`,\n      `Your top category this week is <span class=\"ih a\">${cat.e} ${cat.n}<\u002Fspan> at <span class=\"ih a\">${fmt(top[1])}<\u002Fspan>. Worth reviewing?`));\n  }\n  // Savings goal progress\n  const goals = getGoals();\n  if(goals.length>0){\n    goals.slice(0,2).forEach(g=>{\n      const pct = g.goal>0 ? Math.round((g.saved/g.goal)*100) : 0;\n      let months = \"\";\n      if(g.monthly>0 && g.saved<g.goal){\n        const m = Math.ceil((g.goal-g.saved)/g.monthly);\n        months = ` At ${fmt(g.monthly)}/month, you'll hit it in <span class=\"ih v\">~${m} months<\u002Fspan>.`;\n      }\n      out.push(insightCard(\"🎯\",\"v\",`${g.emoji||\"💰\"} ${g.name} — ${pct}% Complete`,\n        `You've saved <span class=\"ih\">${fmt(g.saved)}<\u002Fspan> of <span class=\"ih\">${fmt(g.goal)}<\u002Fspan>.${months}`));\n    });\n  }\n  // Net worth\n  const month = monthlyData(new Date());\n  const ta = month.assets.reduce((s,a)=>s+Number(a.val||0),0);\n  const tl = month.liabilities.reduce((s,l)=>s+Number(l.val||0),0);\n  const nw = ta-tl;\n  if(ta>0 || tl>0){\n    if(nw>=0){\n      out.push(insightCard(\"💎\",\"\",`Net Worth: ${fmt(nw)}`,\n        `Assets <span class=\"ih\">${fmt(ta)}<\u002Fspan> minus liabilities <span class=\"ih c\">${fmt(tl)}<\u002Fspan>. You're in the green!`));\n    } else {\n      out.push(insightCard(\"💎\",\"c\",`Net Worth: ${fmt(nw)}`,\n        `Liabilities <span class=\"ih c\">${fmt(tl)}<\u002Fspan> exceed assets <span class=\"ih\">${fmt(ta)}<\u002Fspan>. Focus on debt reduction.`));\n    }\n  }\n  // Weekly summary\n  const wInc = week.ie.filter(x=>x.type===\"income\").reduce((s,x)=>s+Number(x.amt||0),0);\n  const wExp = week.ie.filter(x=>x.type===\"expense\").reduce((s,x)=>s+Number(x.amt||0),0);\n  const wNet = wInc - wExp;\n  if(wInc>0||wExp>0){\n    if(wNet>=0){\n      out.push(insightCard(\"💚\",\"\",`Saved ${fmt(wNet)} This Week`,\n        `Income <span class=\"ih\">${fmt(wInc)}<\u002Fspan>, expenses <span class=\"ih c\">${fmt(wExp)}<\u002Fspan>. Keep that gap wide!`));\n    } else {\n      out.push(insightCard(\"🔴\",\"c\",`Deficit of ${fmt(-wNet)}`,\n        `You spent <span class=\"ih c\">${fmt(-wNet)} more<\u002Fspan> than you earned this week. Time to plug some leaks.`));\n    }\n  }\n  // Unpaid bills\n  const unpaid = week.bills.filter(b=>!b.paid);\n  if(unpaid.length>0){\n    out.push(insightCard(\"📋\",\"a\",`${unpaid.length} Unpaid Bill${unpaid.length>1?'s':''} This Week`,\n      `Don't forget: <span class=\"ih a\">${unpaid.map(b=>escapeHtml(b.name)).join(\", \")}<\u002Fspan>. Pay on time to avoid fees.`));\n  }\n  if(out.length===0){\n    out.push(insightCard(\"🌱\",\"\",`Start Tracking Today`,\n      `Add a task, log a spend, or create a savings goal. The more data you add, the smarter your insights get.`));\n  }\n  return out.join(\"\");\n}\nfunction insightCard(ico, iconCls, title, desc){\n  return `<div class=\"insight\">\n    <div class=\"ico ${iconCls}\">${ico}<\u002Fdiv>\n    <div><h4>${title}<\u002Fh4><p>${desc}<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* =========================================== */\n/* ============== AI COACH =================== */\n/* =========================================== */\nfunction renderCoach(){\n  const streak = calcStreak();\n  // 28 day grid\n  const today = new Date(); today.setHours(0,0,0,0);\n  const cells = [];\n  for(let i=27;i>=0;i--){\n    const d = new Date(today); d.setDate(today.getDate()-i);\n    const data = getJSON(\"daily_\"+ymd(d), null);\n    const filled = data && ((data.tasks&&data.tasks.length>0)||(data.spends&&data.spends.length>0));\n    const isToday = i===0;\n    cells.push(`<div class=\"streak-cell ${filled?'f':''} ${isToday?'today':''}\">${filled?'✓':''}<\u002Fdiv>`);\n  }\n  let streakMsg;\n  if(streak===0) streakMsg=\"Log your first day to start your streak!\";\n  else if(streak<7) streakMsg=`${7-streak} more days to a 7-day streak! 💪`;\n  else if(streak<30) streakMsg=`${30-streak} days to a 30-day streak! 🔥`;\n  else streakMsg=\"You are a finance tracking legend! 🏆\";\n\n  // Restore previous chat history if any\n  const history = getJSON(\"chat_history\", null);\n\n  $(\"#main\").innerHTML = `\n    <h1 class=\"page-title\" style=\"margin-bottom:20px\">🧠 AI Money Coach<\u002Fh1>\n    <div class=\"grid-auto\">\n      <div>\n        <div class=\"card\">\n          <div class=\"card-title\">Quick Questions<\u002Fdiv>\n          <div class=\"qq\">\n            <button onclick=\"askCoach('How am I doing?')\">How am I doing?<\u002Fbutton>\n            <button onclick=\"askCoach('Top spending?')\">Top spending?<\u002Fbutton>\n            <button onclick=\"askCoach('Savings timeline?')\">Savings timeline?<\u002Fbutton>\n            <button onclick=\"askCoach('Save more tips')\">Save more tips<\u002Fbutton>\n            <button onclick=\"askCoach('Net worth?')\">Net worth?<\u002Fbutton>\n            <button onclick=\"askCoach('Motivate me 💪')\">Motivate me 💪<\u002Fbutton>\n            <button onclick=\"askCoach('Weekly focus?')\">Weekly focus?<\u002Fbutton>\n            <button onclick=\"askCoach('On track?')\">On track?<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"streak-panel\">\n          <div class=\"streak-big\">${streak}<\u002Fdiv>\n          <div class=\"streak-lbl\">days logged in a row<\u002Fdiv>\n          <div class=\"streak-grid\">${cells.join(\"\")}<\u002Fdiv>\n          <div class=\"streak-msg\">${streakMsg}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"card-title\">Chat with your Money Coach<\u002Fdiv>\n        <div class=\"chat-box\" id=\"chatBox\"><\u002Fdiv>\n        <div class=\"form-row\" style=\"margin-top:12px\">\n          <input id=\"chatInput\" placeholder=\"Ask anything about your money...\" onkeydown=\"if(event.key==='Enter')sendChat()\" />\n          <button class=\"btn primary\" onclick=\"sendChat()\">Send<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n\n  const box = $(\"#chatBox\");\n  if(history && history.length){\n    history.forEach(m=>{\n      const div = document.createElement(\"div\");\n      div.className = \"msg \"+(m.role===\"u\"?\"u\":\"c\");\n      div.innerHTML = m.text;\n      box.appendChild(div);\n    });\n  } else {\n    appendCoach(\"👋 Hey there! I'm your <strong>Money Coach<\u002Fstrong>. Ask me about your spending, savings, budgets, or just say hi. I read your real data — no API needed.\");\n  }\n  box.scrollTop = box.scrollHeight;\n}\n\nfunction appendCoach(html){\n  const box = $(\"#chatBox\");\n  if(!box) return;\n  const div = document.createElement(\"div\");\n  div.className = \"msg c\";\n  div.innerHTML = html;\n  box.appendChild(div);\n  box.scrollTop = box.scrollHeight;\n  saveHistory(\"c\", html);\n}\nfunction appendUser(text){\n  const box = $(\"#chatBox\");\n  if(!box) return;\n  const div = document.createElement(\"div\");\n  div.className = \"msg u\";\n  div.textContent = text;\n  box.appendChild(div);\n  box.scrollTop = box.scrollHeight;\n  saveHistory(\"u\", escapeHtml(text));\n}\nfunction saveHistory(role, text){\n  const h = getJSON(\"chat_history\", []);\n  h.push({role, text});\n  if(h.length>40) h.splice(0, h.length-40);\n  localStorage.setItem(\"chat_history\", JSON.stringify(h)); // skip showSave to avoid spam\n}\n\nfunction askCoach(q){\n  $(\"#chatInput\").value = q;\n  sendChat();\n}\nfunction sendChat(){\n  const inp = $(\"#chatInput\");\n  const q = inp.value.trim();\n  if(!q) return;\n  appendUser(q);\n  inp.value = \"\";\n  // typing\n  const box = $(\"#chatBox\");\n  const typing = document.createElement(\"div\");\n  typing.className = \"typing\";\n  typing.innerHTML = '<div class=\"typing-dot\"><\u002Fdiv><div class=\"typing-dot\"><\u002Fdiv><div class=\"typing-dot\"><\u002Fdiv>';\n  box.appendChild(typing);\n  box.scrollTop = box.scrollHeight;\n  const delay = 700 + Math.random()*500;\n  setTimeout(()=>{\n    typing.remove();\n    appendCoach(coachReply(q));\n  }, delay);\n}\n\nfunction buildCoachCtx(){\n  const streak = calcStreak();\n  const today = dailyData(new Date());\n  const week = weeklyData(new Date());\n  const month = monthlyData(new Date());\n  const goals = getGoals();\n  const todaySpend = today.spends.reduce((s,x)=>s+Number(x.amt||0),0);\n  const todayBudget = Number(today.budget||0);\n  const totalSpent = month.budget.reduce((s,b)=>s+Number(b.spent||0),0);\n  const totalBudget = month.budget.reduce((s,b)=>s+Number(b.budget||0),0);\n  const ta = month.assets.reduce((s,a)=>s+Number(a.val||0),0);\n  const tl = month.liabilities.reduce((s,l)=>s+Number(l.val||0),0);\n  const netWorth = ta - tl;\n  const weeklyIncome = week.ie.filter(x=>x.type===\"income\").reduce((s,x)=>s+Number(x.amt||0),0);\n  const weeklyExpenses = week.ie.filter(x=>x.type===\"expense\").reduce((s,x)=>s+Number(x.amt||0),0);\n  const unpaidBills = week.bills.filter(b=>!b.paid);\n  return {streak, todaySpend, todayBudget, totalSpent, totalBudget, netWorth, weeklyIncome, weeklyExpenses, goals, budgetCats:month.budget, monthIncome:Number(month.income||0), unpaidBills};\n}\n\nfunction coachReply(q){\n  const c = buildCoachCtx();\n  const Q = q.toLowerCase();\n\n  if(/streak|consistent/.test(Q)){\n    if(c.streak===0) return \"You haven't started a streak yet — log a task or a spend today to begin! <strong>Day 1 is the hardest, the rest is easier.<\u002Fstrong>\";\n    return `You're on a <strong>${c.streak}-day streak<\u002Fstrong> 🔥 — consistency is your superpower. ${c.streak<7?\"You're building momentum.\":c.streak<30?\"You're forming a real habit now.\":\"You've crossed a serious threshold. Keep stacking days.\"}`;\n  }\n  if(/net worth|worth/.test(Q)){\n    if(c.netWorth===0 && c.budgetCats.length===0) return \"I don't have your assets and liabilities yet. <strong>Head to the Monthly tab<\u002Fstrong> and log them — that's how I'll calculate your net worth.\";\n    if(c.netWorth>=0) return `Your net worth is <strong>${fmt(c.netWorth)}<\u002Fstrong>. You're in positive territory — focus on growing assets and reducing liabilities.`;\n    return `Your net worth is <strong>${fmt(c.netWorth)}<\u002Fstrong> — currently negative. <strong>Top priority:<\u002Fstrong> attack the highest-interest liability first while saving a small emergency cushion.`;\n  }\n  if(/budget|doing|month/.test(Q)){\n    if(c.totalBudget===0) return \"Set up a monthly budget in the <strong>Monthly tab<\u002Fstrong> and I'll tell you exactly how you're tracking.\";\n    const pct = Math.round((c.totalSpent/c.totalBudget)*100);\n    if(pct<=80) return `You've used <strong>${pct}%<\u002Fstrong> of your monthly budget (${fmt(c.totalSpent)} of ${fmt(c.totalBudget)}). <strong>You're on track!<\u002Fstrong>`;\n    if(pct<=100) return `You're at <strong>${pct}%<\u002Fstrong> of your monthly budget. <strong>Tighten up<\u002Fstrong> on discretionary spending for the rest of the month.`;\n    return `You're at <strong>${pct}%<\u002Fstrong> of your monthly budget — that's ${fmt(c.totalSpent-c.totalBudget)} over. <strong>Pause non-essentials<\u002Fstrong> and reset next month with a buffer.`;\n  }\n  if(/spend|categ|food|cost/.test(Q)){\n    if(c.budgetCats.length===0) return \"I don't see any budget categories yet. <strong>Add them in the Monthly tab<\u002Fstrong> to see a category breakdown.\";\n    const sorted = c.budgetCats.slice().sort((a,b)=>Number(b.spent||0)-Number(a.spent||0));\n    const lines = sorted.slice(0,5).map(b=>`• <strong>${escapeHtml(b.name)}<\u002Fstrong>: ${fmt(b.spent)} / ${fmt(b.budget)}`).join(\"<br>\");\n    return `Here's where your money is going this month:<br>${lines}<br><br>${sorted[0].spent>sorted[0].budget?`Your <strong>${escapeHtml(sorted[0].name)}<\u002Fstrong> category is over budget. Worth reviewing.`:\"Looks like you're managing your categories well.\"}`;\n  }\n  if(/saving|goal|timeline|track/.test(Q)){\n    if(c.goals.length===0) return \"You don't have any savings goals yet. <strong>Hop over to Savings Goals<\u002Fstrong> and add one — even ${fmt(500)}/month for an emergency fund counts.\";\n    const lines = c.goals.map(g=>{\n      const pct = g.goal>0?Math.round((g.saved/g.goal)*100):0;\n      const left = Math.max(0, g.goal-g.saved);\n      const months = g.monthly>0 && left>0 ? ` (~${Math.ceil(left/g.monthly)} months at ${fmt(g.monthly)}/mo)` : \"\";\n      return `• ${g.emoji||\"💰\"} <strong>${escapeHtml(g.name)}<\u002Fstrong>: ${pct}% — ${fmt(g.saved)} of ${fmt(g.goal)}${months}`;\n    }).join(\"<br>\");\n    return `Your savings goals:<br>${lines}`;\n  }\n  if(/week|income/.test(Q)){\n    if(c.weeklyIncome===0 && c.weeklyExpenses===0) return \"I don't have weekly transactions yet. <strong>Log income and expenses in the Weekly tab<\u002Fstrong> and I'll do the math.\";\n    const net = c.weeklyIncome - c.weeklyExpenses;\n    let msg = `This week: <strong>${fmt(c.weeklyIncome)}<\u002Fstrong> in, <strong>${fmt(c.weeklyExpenses)}<\u002Fstrong> out. Net: <strong>${fmt(net)}<\u002Fstrong>.`;\n    if(c.unpaidBills.length>0) msg += `<br><br>⚠️ Heads up: <strong>${c.unpaidBills.length} unpaid bill${c.unpaidBills.length>1?'s':''}<\u002Fstrong> still pending.`;\n    return msg;\n  }\n  if(/today|daily/.test(Q)){\n    if(c.todaySpend===0 && c.todayBudget===0) return \"Nothing logged today yet. <strong>Log a spend or set a budget<\u002Fstrong> on the Daily tab so I can track today with you.\";\n    if(c.todayBudget===0) return `You've spent <strong>${fmt(c.todaySpend)}<\u002Fstrong> today. Set a daily budget so I can flag overruns in real time.`;\n    const left = c.todayBudget - c.todaySpend;\n    if(left>=0) return `Today: <strong>${fmt(c.todaySpend)}<\u002Fstrong> spent against a <strong>${fmt(c.todayBudget)}<\u002Fstrong> budget. You've got <strong>${fmt(left)}<\u002Fstrong> left. 🟢`;\n    return `Today: <strong>${fmt(c.todaySpend)}<\u002Fstrong> spent — that's <strong>${fmt(-left)} over<\u002Fstrong> your ${fmt(c.todayBudget)} budget. 🔴 Consider closing the wallet for the day.`;\n  }\n  if(/tip|save more|advice/.test(Q)){\n    const tips = [];\n    if(c.todayBudget>0 && c.todaySpend>c.todayBudget) tips.push(\"Your daily spend keeps going over budget. <strong>Try a 'no-spend Wednesday'<\u002Fstrong> this week.\");\n    if(c.goals.find(g=>!g.monthly)) tips.push(\"Some goals don't have a monthly contribution. <strong>Set one per goal<\u002Fstrong> — automation beats motivation.\");\n    if(c.unpaidBills.length>0) tips.push(`<strong>Pay your ${c.unpaidBills.length} pending bill${c.unpaidBills.length>1?'s':''}<\u002Fstrong> on time to avoid late fees.`);\n    if(c.totalBudget>0 && c.totalSpent>c.totalBudget) tips.push(\"You're over monthly budget. <strong>Find one category to cut by 20%<\u002Fstrong> next month.\");\n    if(c.netWorth<0) tips.push(\"Net worth is negative. <strong>Funnel any windfall<\u002Fstrong> to the highest-interest debt.\");\n    if(c.streak===0) tips.push(\"<strong>Log just one thing today<\u002Fstrong> — that's how streaks start.\");\n    if(tips.length<3){\n      tips.push(\"<strong>Automate your savings<\u002Fstrong>: set up a recurring transfer the day after payday.\");\n      tips.push(\"<strong>Use the 24-hour rule<\u002Fstrong>: for any non-essential purchase over ${fmt(2000)}, wait a day.\");\n      tips.push(\"<strong>Review every Sunday<\u002Fstrong> — 15 minutes can save you thousands over a year.\");\n    }\n    return \"Here are 3 tips just for you:<br><br>\" + tips.slice(0,3).map((t,i)=>`${i+1}. ${t}`).join(\"<br><br>\");\n  }\n  if(/motivat|inspire/.test(Q)){\n    const m = [\n      \"Every rupee you save today is a <strong>vote for the life you want tomorrow<\u002Fstrong>. Keep voting. 🗳️\",\n      \"You don't have to be rich to start. <strong>You have to start to be rich.<\u002Fstrong> One log at a time. 🌱\",\n      \"<strong>Boring finances build exciting lives.<\u002Fstrong> Stay consistent. The compound returns are coming. 📈\",\n      \"The best time to plant a money tree was 10 years ago. <strong>The second best time is right now.<\u002Fstrong> 🌳\"\n    ];\n    return m[Math.floor(Math.random()*m.length)];\n  }\n  // Default snapshot\n  return `Here's your money snapshot:<br>\n  • <strong>Streak:<\u002Fstrong> ${c.streak} day${c.streak===1?'':'s'} 🔥<br>\n  • <strong>Today:<\u002Fstrong> ${fmt(c.todaySpend)} spent${c.todayBudget>0?` / ${fmt(c.todayBudget)} budget`:\"\"}<br>\n  • <strong>This week:<\u002Fstrong> ${fmt(c.weeklyIncome - c.weeklyExpenses)} net<br>\n  • <strong>Net worth:<\u002Fstrong> ${fmt(c.netWorth)}<br>\n  • <strong>Goals:<\u002Fstrong> ${c.goals.length} active<br><br>\n  Try asking: \"save more tips\", \"savings timeline\", or \"motivate me\".`;\n}\n\n/* =========================================== */\n/* =========== PAYDAY MODAL ================== */\n/* =========================================== */\nfunction openPayday(){\n  const m = monthlyData(new Date());\n  $(\"#paydayInput\").value = m.income || \"\";\n  updatePayday();\n  $(\"#paydayModal\").classList.add(\"open\");\n}\nfunction closePayday(){ $(\"#paydayModal\").classList.remove(\"open\"); }\nfunction updatePayday(){\n  const amt = Number($(\"#paydayInput\").value||0);\n  const needs = Math.round(amt*0.5);\n  const wants = Math.round(amt*0.3);\n  const savings = amt - needs - wants;\n  $(\"#allocations\").innerHTML = `\n    <div class=\"alloc-row\">\n      <div class=\"left\"><div class=\"nm\">🏠 Needs (50%)<\u002Fdiv><div class=\"desc\">Rent, food, bills, transport<\u002Fdiv><\u002Fdiv>\n      <div class=\"val\">${fmt(needs)}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"alloc-row amber\">\n      <div class=\"left\"><div class=\"nm\">🎬 Wants (30%)<\u002Fdiv><div class=\"desc\">Entertainment, dining, shopping<\u002Fdiv><\u002Fdiv>\n      <div class=\"val\">${fmt(wants)}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"alloc-row\">\n      <div class=\"left\"><div class=\"nm\">💰 Savings (20%)<\u002Fdiv><div class=\"desc\">Goals, emergency, investments<\u002Fdiv><\u002Fdiv>\n      <div class=\"val\">${fmt(savings)}<\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  const goals = getGoals().filter(g=>Number(g.monthly||0)>0);\n  if(goals.length>0){\n    $(\"#goalAllocations\").innerHTML = `\n      <div class=\"modal-section-title\">Your Goals Monthly Contributions<\u002Fdiv>\n      ${goals.map(g=>`\n        <div class=\"alloc-row\">\n          <div class=\"left\"><div class=\"nm\">${g.emoji||\"💰\"} ${escapeHtml(g.name)}<\u002Fdiv><\u002Fdiv>\n          <div class=\"val\">${fmt(g.monthly)}<\u002Fdiv>\n        <\u002Fdiv>\n      `).join(\"\")}\n    `;\n  } else {\n    $(\"#goalAllocations\").innerHTML = \"\";\n  }\n}\nfunction applyPayday(){\n  const amt = Number($(\"#paydayInput\").value||0);\n  if(!amt){ closePayday(); return; }\n  const data = monthlyData(new Date());\n  data.income = amt;\n  saveMonthly(new Date(), data);\n  closePayday();\n  if(currentTab===\"monthly\") renderMonthly();\n}\n\n\n/* ===== Tasks Detail modal ===== */\nfunction openTasksModal(){\n  const data = dailyData(viewDate);\n  const tasks = data.tasks || [];\n  const done = tasks.filter(t=>t.done).length;\n  const total = tasks.length;\n  $(\"#tasksModalSubtitle\").textContent = total===0\n    ? \"No tasks added yet for this day.\"\n    : `${done} of ${total} completed`;\n  const body = $(\"#tasksModalBody\");\n  if(total===0){\n    body.innerHTML = `<div class=\"empty-state\" style=\"margin-top:8px\">Add money tasks from the Daily view to see them here.<\u002Fdiv>`;\n  } else {\n    body.innerHTML = tasks.map((t,i)=>`\n      <div class=\"detail-row\">\n        <div class=\"d-check ${t.done?'done':'pending'}\" onclick=\"toggleTaskFromModal(${i})\" style=\"cursor:pointer\" title=\"${t.done?'Mark incomplete':'Mark complete'}\">${t.done?'✓':''}<\u002Fdiv>\n        <div class=\"d-text ${t.done?'done':''}\">${escapeHtml(t.text)}<\u002Fdiv>\n      <\u002Fdiv>\n    `).join(\"\") + `\n      <div class=\"detail-summary\">\n        <span class=\"lbl\">Completed<\u002Fspan>\n        <span class=\"val\">${done} / ${total}<\u002Fspan>\n      <\u002Fdiv>`;\n  }\n  $(\"#tasksModal\").classList.add(\"open\");\n}\nfunction closeTasksModal(){ $(\"#tasksModal\").classList.remove(\"open\"); }\nfunction toggleTaskFromModal(i){\n  const data = dailyData(viewDate);\n  data.tasks[i].done = !data.tasks[i].done;\n  saveDaily(viewDate, data);\n  openTasksModal();\n  if(currentTab===\"daily\") renderDaily();\n}\n\n/* ===== Spending Detail modal ===== */\nfunction openSpendsModal(){\n  const data = dailyData(viewDate);\n  const spends = data.spends || [];\n  const total = spends.reduce((s,x)=>s+Number(x.amt||0),0);\n  $(\"#spendsModalSubtitle\").textContent = spends.length===0\n    ? \"Nothing logged yet for this day.\"\n    : `${spends.length} item${spends.length===1?'':'s'} logged`;\n  const body = $(\"#spendsModalBody\");\n  if(spends.length===0){\n    body.innerHTML = `<div class=\"empty-state\" style=\"margin-top:8px\">Log a spend from the Daily view to see it here.<\u002Fdiv>`;\n  } else {\n    body.innerHTML = spends.map(s=>{\n      const c = CATEGORIES.find(x=>x.v===s.cat) || CATEGORIES[5];\n      return `\n        <div class=\"detail-row\">\n          <div class=\"d-emoji\">${c.e}<\u002Fdiv>\n          <div class=\"d-text\">\n            ${escapeHtml(s.name)}\n            <div class=\"d-cat\">${c.n}<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"d-amt\">${fmt(s.amt)}<\u002Fdiv>\n        <\u002Fdiv>`;\n    }).join(\"\") + `\n      <div class=\"detail-summary\">\n        <span class=\"lbl\">Total Spent<\u002Fspan>\n        <span class=\"val coral\">${fmt(total)}<\u002Fspan>\n      <\u002Fdiv>`;\n  }\n  $(\"#spendsModal\").classList.add(\"open\");\n}\nfunction closeSpendsModal(){ $(\"#spendsModal\").classList.remove(\"open\"); }\n\n/* ===== Clear modal ===== */\nfunction openClear(){ $(\"#clearModal\").classList.add(\"open\"); }\nfunction closeClear(){ $(\"#clearModal\").classList.remove(\"open\"); }\nfunction doClear(){\n  const dk = localStorage.getItem(\"dk\");\n  localStorage.clear();\n  if(dk!==null) localStorage.setItem(\"dk\", dk);\n  closeClear();\n  init();\n}\n\n/* ===== Backup / Restore ===== */\nfunction doBackup(){\n  const out = {};\n  for(let i=0;i<localStorage.length;i++){\n    const k = localStorage.key(i);\n    out[k] = localStorage.getItem(k);\n  }\n  const blob = new Blob([JSON.stringify(out,null,2)],{type:\"application/json\"});\n  const url = URL.createObjectURL(blob);\n  const a = document.createElement(\"a\");\n  a.href = url;\n  a.download = \"finance-planner-backup-\"+todayISO()+\".json\";\n  a.click();\n  URL.revokeObjectURL(url);\n  showSave();\n}\nfunction doRestore(e){\n  const f = e.target.files[0];\n  if(!f) return;\n  const r = new FileReader();\n  r.onload = ev =>{\n    try{\n      const data = JSON.parse(ev.target.result);\n      if(!confirm(\"This will overwrite ALL your current data. Continue?\")) return;\n      const dk = localStorage.getItem(\"dk\");\n      localStorage.clear();\n      Object.entries(data).forEach(([k,v])=>{\n        if(typeof v === \"string\") localStorage.setItem(k, v);\n        else localStorage.setItem(k, JSON.stringify(v));\n      });\n      if(dk!==null && !data.dk) localStorage.setItem(\"dk\", dk);\n      alert(\"Restored successfully ✅\");\n      init();\n    } catch(err){\n      alert(\"Couldn't read that backup file. Make sure it's a valid JSON export.\");\n    }\n  };\n  r.readAsText(f);\n  e.target.value = \"\";\n}\n\n/* ===== Escape helpers ===== */\nfunction escapeHtml(s){ return String(s||\"\").replace(/[&<>\"']/g, c=>({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":\"&#39;\"}[c])); }\nfunction escapeAttr(s){ return escapeHtml(s); }\n\n/* ===== INIT ===== */\nfunction init(){\n  applyDark(getRaw(\"dk\",\"0\")===\"1\");\n  refreshCurrencyUI();\n  refreshHeaderDate();\n  refreshStreakBadge();\n  render();\n}\ninit();\n\n// Click outside modal to close\n$$(\".modal-bg\").forEach(m=>{\n  m.addEventListener(\"click\", e=>{\n    if(e.target===m) m.classList.remove(\"open\");\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
